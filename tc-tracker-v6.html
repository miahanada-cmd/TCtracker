<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TC Tracker — LRG · CA RPA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#f5f0e8;color:#3a3020;font-family:'Lato','Helvetica Neue',sans-serif;font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:#f0ebe0}::-webkit-scrollbar-thumb{background:#d0c8b8;border-radius:2px}
input,textarea,select{outline:none;font-family:inherit}
input::placeholder,textarea::placeholder{color:#c0b8a8}
#app{display:flex;flex-direction:column;height:100vh}
/* TOPBAR */
#topbar{background:#faf7f2;border-bottom:1px solid #e0d8c8;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;letter-spacing:.5px;color:#2a2010}
.brand-sub{font-size:9px;color:#b0a890;letter-spacing:2.5px;font-weight:700;margin-left:12px}
.top-right{display:flex;align-items:center;gap:14px}
#save-status{font-size:10px;letter-spacing:1px;color:#90a880}
.btn-primary{background:#3a3020;color:#f5f0e8;border:none;border-radius:20px;padding:7px 18px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer;letter-spacing:.8px}
.btn-primary:hover{opacity:.82}
/* BODY */
#body{display:flex;flex:1;overflow:hidden}
#sidebar{width:196px;background:#f0ebe0;border-right:1px solid #e0d8c8;overflow-y:auto;flex-shrink:0}
.tx-tab{padding:13px 14px;border-bottom:1px solid #e0d8c8;cursor:pointer;transition:background .14s;border-left:3px solid transparent}
.tx-tab:hover{background:#ede8de}
.tx-tab.active{background:#faf7f2;border-left-color:#8a7a50}
.t-addr{font-size:11px;color:#7a7060;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-tab.active .t-addr{color:#2a2010;font-weight:700}
.t-client{font-size:10px;color:#a09880;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-coe{font-size:10px;margin-top:3px;font-weight:700}
.pb-out{background:#e0d8c8;border-radius:6px;height:4px;margin-top:7px}
.pb-in{height:4px;border-radius:6px;background:#8a7a50;transition:width .4s}
.t-pct{font-size:9px;color:#b0a890;margin-top:2px}
#main-scroll{flex:1;overflow-y:auto}
#main{padding:20px 26px 60px}
/* SHARED */
.fi{background:#faf7f2;border:1px solid #d8d0c0;border-radius:7px;color:#3a3020;padding:7px 10px;font-family:'Lato',sans-serif;font-size:12px;transition:border-color .18s;width:100%}
.fi:focus{border-color:#a09060}
.fi-sm{background:#f5f0e8;border:1px solid #d8d0c0;border-radius:6px;color:#3a3020;padding:5px 8px;font-family:'Lato',sans-serif;font-size:11px}
.fi-sm:focus{border-color:#a09060}
.frow{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.flabel{font-size:9px;color:#8a7a60;font-weight:700;letter-spacing:1.5px;white-space:nowrap;display:block;margin-bottom:5px}
.btn-ghost{background:none;border:1px solid #d0b8b8;border-radius:7px;color:#a07070;padding:7px 11px;font-size:10px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-ghost:hover{color:#c05050}
.sec{background:#faf7f2;border:1px solid #e0d8c8;border-radius:12px;margin-bottom:16px;overflow:hidden}
.sec-hdr{padding:11px 18px;border-bottom:1px solid #ece4d8;display:flex;align-items:center;justify-content:space-between;gap:10px}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;font-style:italic;color:#4a4030;letter-spacing:.3px}
.sec-body{padding:16px 18px}
/* PROGRESS */
#prog-wrap{background:#faf7f2;border:1px solid #e0d8c8;border-radius:10px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.prog-bar-out{flex:1;min-width:80px;background:#e8e0d0;border-radius:6px;height:6px}
.prog-bar-in{height:6px;border-radius:6px;background:linear-gradient(90deg,#8a7a50,#b0a060);transition:width .5s}
/* TABS */
.tab-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab-btn{cursor:pointer;padding:6px 16px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;letter-spacing:.7px;border-radius:20px;transition:all .14s}
.tab-btn.active{background:#3a3020;color:#f5f0e8;border:1px solid #3a3020}
.tab-btn:not(.active){background:transparent;color:#8a7a60;border:1px solid #d0c8b8}
/* TX HEADER CARD */
.tx-header-card{background:#faf7f2;border:1px solid #e0d8c8;border-radius:12px;padding:16px 18px;margin-bottom:16px}
.represent-toggle{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.rep-btn{cursor:pointer;padding:5px 16px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;letter-spacing:.5px;border-radius:20px;border:1px solid #d0c8b8;background:transparent;color:#8a7a60;transition:all .14s}
.rep-btn.active-buyer{background:#d8eaf0;border-color:#80aac0;color:#1a4a60}
.rep-btn.active-seller{background:#f0e8d8;border-color:#c0a070;color:#5a3a10}
/* OUR SIDE card */
.our-side-card{background:#f5f0e8;border:1px solid #e0d8c8;border-radius:10px;padding:14px 16px;margin-bottom:14px}
.our-side-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.our-side-field{font-size:11px;color:#3a3020;line-height:1.5}
.our-side-field .lbl{font-size:9px;color:#a09880;font-weight:700;letter-spacing:1px;display:block;margin-bottom:1px}
/* PRICE */
.price-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.price-tag{font-size:10px;background:#ede8de;color:#6a5a40;border-radius:4px;padding:2px 7px;font-weight:700;white-space:nowrap}
.price-change-badge{font-size:9px;border-radius:4px;padding:2px 6px;font-weight:700;white-space:nowrap}
/* OPP GRID */
.opp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
/* RR/CR */
.rr-table{width:100%;border-collapse:collapse}
.rr-table th{font-size:9px;color:#b0a890;letter-spacing:2px;font-weight:700;padding:7px 10px;text-align:left;border-bottom:1px solid #e8e0d0;background:#f5f0e8}
.rr-table td{padding:7px 10px;border-bottom:1px solid #f0ebe0;font-size:12px;vertical-align:middle}
.rr-table tr:last-child td{border-bottom:none}
.rr-table tr:hover td{background:#f8f4ee}
.rr-inp{background:transparent;border:none;border-bottom:1px solid #e8e0d0;width:100%;font-family:'Lato',sans-serif;font-size:11px;color:#3a3020;padding:2px 4px}
.rr-inp:focus{outline:none;border-bottom-color:#a09060}
.rr-status-sel{background:#f5f0e8;border:1px solid #d8d0c0;border-radius:5px;padding:3px 6px;font-size:10px;font-family:'Lato',sans-serif;color:#3a3020;cursor:pointer}
.btn-add-rr{background:none;border:1px solid #d0c8b8;border-radius:20px;color:#8a7a60;padding:5px 14px;font-size:10px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer;letter-spacing:.5px}
.btn-add-rr:hover{background:#ede8de}
.btn-rm-row{background:none;border:none;color:#c0a898;cursor:pointer;font-size:13px;padding:0 2px;line-height:1}
.btn-rm-row:hover{color:#a05050}
/* BM */
.bm-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.bm-item{display:flex;align-items:center;gap:9px;padding:8px 14px;border-bottom:1px solid #f0ebe0;transition:background .12s}
.bm-item:hover{background:#f5f0e8}
.bm-item:nth-child(odd){border-right:1px solid #f0ebe0}
.bm-cb{width:15px;height:15px;accent-color:#8a7a50;cursor:pointer;flex-shrink:0}
.bm-label{font-size:11px;color:#3a3020;cursor:pointer}
.bm-label.checked{color:#8a9a80;text-decoration:line-through}
/* VENDORS */
.vendors-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.vendor-card{background:#faf7f2;border:1px solid #e0d8c8;border-radius:12px;padding:16px}
.vendor-card.custom-card{border-style:dashed}
.vendor-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.vendor-title{font-size:9px;color:#b0a890;letter-spacing:2px;font-weight:700}
.vendor-links{margin-top:8px;display:flex;gap:12px;flex-wrap:wrap}
.vendor-link{font-size:10px;color:#8a7a50;text-decoration:none;font-weight:700}
.add-vendor-card{background:#f5f0e8;border:2px dashed #d8d0c0;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px}
/* MILESTONES */
.ms-wrap{background:#faf7f2;border:1px solid #e0d8c8;border-radius:12px;overflow:hidden}
.ms-hdr{padding:9px 18px;border-bottom:1px solid #e8e0d0;display:flex;justify-content:space-between}
.ms-hdr span{font-size:9px;color:#b0a890;letter-spacing:2px;font-weight:700}
.grp-lbl{font-size:9px;letter-spacing:2.5px;color:#b0a890;padding:7px 18px 4px;background:#f5f0e8;border-top:1px solid #ece4d8;font-weight:700}
.ms-row{display:flex;align-items:center;justify-content:space-between;padding:9px 18px;border-bottom:1px solid #ece4d8;transition:background .12s;gap:10px;flex-wrap:wrap}
.ms-row:hover{background:#ede8de}
.ms-row.done-row{background:#f2f5f0}
.ms-left{display:flex;align-items:center;gap:8px;min-width:160px}
.ms-dot2{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ms-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap;justify-content:flex-end}
.date-input{background:#f5f0e8;border:1px solid #d8d0c0;border-radius:6px;color:#5a5040;padding:3px 7px;font-size:10px;font-family:'Lato',sans-serif}
.day-badge{border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.sbtn{cursor:pointer;border-radius:20px;padding:3px 10px;font-size:10px;font-family:'Lato',sans-serif;font-weight:700;letter-spacing:.4px;border:1px solid transparent;transition:opacity .12s}
.sbtn:hover{opacity:.75}
.custom-badge{font-size:8px;background:#ede8de;color:#8a7a60;border-radius:3px;padding:1px 5px;font-weight:700;letter-spacing:.5px;margin-left:4px;vertical-align:middle}
.add-ms-bar{display:flex;gap:8px;align-items:center;padding:10px 18px;border-top:1px solid #ece4d8;background:#f8f4ee;flex-wrap:wrap}
.add-ms-input{background:#faf7f2;border:1px solid #d8d0c0;border-radius:6px;color:#3a3020;padding:6px 10px;font-family:'Lato',sans-serif;font-size:12px;flex:1;min-width:120px}
.add-ms-input:focus{outline:none;border-color:#a09060}
.add-ms-select{background:#faf7f2;border:1px solid #d8d0c0;border-radius:6px;color:#5a5040;padding:6px 8px;font-family:'Lato',sans-serif;font-size:11px;cursor:pointer}
/* GANTT */
#gantt-section{background:#faf7f2;border:1px solid #e0d8c8;border-radius:12px;margin-bottom:16px;overflow:hidden}
.gantt-header{padding:13px 18px 11px;border-bottom:1px solid #ece4d8;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.gantt-title{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;font-style:italic;color:#4a4030}
.gantt-legend{display:flex;gap:14px;padding:0 18px 10px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px;font-size:9px;color:#8a7a60;font-weight:700;letter-spacing:.5px}
.leg-swatch{height:10px;width:22px;border-radius:3px}
.gantt-scroll{overflow-x:auto;padding-bottom:4px}
.gantt-grid{display:flex;flex-direction:column;min-width:700px}
.gantt-day-cell{flex:1;text-align:center;font-size:8px;color:#b0a890;font-weight:700;padding:5px 0;border-right:1px solid #f0ebe0;user-select:none}
.gantt-day-cell.today-col{background:#e8e0d0;color:#2a2010}
.gantt-day-cell.weekend{color:#c8c0b0}
.gantt-row{display:flex;align-items:flex-start;border-bottom:1px solid #f0ebe0;min-height:38px}
.gantt-row:last-child{border-bottom:none}
.gantt-row:hover{background:#f8f4ee}
.gantt-row-label{width:210px;flex-shrink:0;padding:6px 12px 6px 18px;display:flex;flex-direction:column;gap:2px}
.gantt-row-name{font-size:11px;color:#3a3020;font-weight:700}
.gantt-row-sub{font-size:9px;color:#a09880}
.gantt-row-days-input{display:flex;align-items:center;gap:4px;margin-top:2px}
.days-input{width:36px;background:#f0ebe0;border:1px solid #d8d0c0;border-radius:4px;color:#5a5040;padding:1px 4px;font-size:10px;font-family:'Lato',sans-serif;text-align:center}
.days-label{font-size:9px;color:#b0a890}
.gantt-bar-area{flex:1;position:relative;height:38px;display:flex;align-items:center}
.gantt-bar-cell{flex:1;height:38px;border-right:1px solid #f0ebe0;position:relative}
.gantt-bar-cell.today-col{background:#f0ebe0}
.gantt-bar{position:absolute;height:18px;top:50%;transform:translateY(-50%);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;letter-spacing:.3px;white-space:nowrap;overflow:hidden;padding:0 6px;z-index:2;cursor:default}
.gantt-bar:hover{opacity:.85}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:#5a5040;z-index:10;pointer-events:none}
.gantt-notice{padding:28px 18px;text-align:center;font-style:italic;color:#b0a890;font-size:12px}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(50,40,20,.42);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(5px)}

/* DASHBOARD */
.dash-card{background:#faf7f2;border:1px solid #e0d8c8;border-radius:12px;padding:18px 20px;margin-bottom:14px;transition:box-shadow .15s;cursor:pointer}
.dash-card:hover{box-shadow:0 2px 12px rgba(58,48,32,.08);border-color:#c8b870}
.dash-card.cancelled-card{opacity:.6;border-style:dashed}
.dash-card.closed-card{background:#f5faf5;border-color:#b8d8b8;opacity:.85}
.dash-urgency{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.urg-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.dash-progress-bar{background:#e8e0d0;border-radius:6px;height:5px;margin-top:8px}
.dash-progress-fill{height:5px;border-radius:6px;background:linear-gradient(90deg,#8a7a50,#b0a060);transition:width .4s}
.dash-notes-wrap{background:#faf7f2;border:1px solid #e0d8c8;border-radius:12px;overflow:hidden;margin-bottom:20px}
.empty-dash{display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;color:#c0b8a8;gap:12px}

.modal{background:#faf7f2;border:1px solid #e0d8c8;border-radius:16px;padding:28px;width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.13)}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#2a2010;margin-bottom:2px}
.modal-sub{font-size:9px;color:#b0a890;letter-spacing:2px;font-weight:700;margin-bottom:18px}
.field-wrap{margin-bottom:11px}
.field-wrap label{display:block;font-size:9px;color:#8a7a60;letter-spacing:1.5px;font-weight:700;margin-bottom:4px}
.modal-btns{display:flex;gap:8px;margin-top:18px}
.btn-create{flex:1;background:#3a3020;color:#f5f0e8;border:none;border-radius:20px;padding:10px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer}
.btn-cancel{flex:1;background:transparent;color:#8a7a60;border:1px solid #d0c8b8;border-radius:20px;padding:10px;font-size:11px;font-family:'Lato',sans-serif;cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <div>
        <span class="brand">TC Tracker</span>
        <span class="brand-sub">LANDON REALTY GROUP · CA RPA</span>
      </div>
      <button id="dash-btn" onclick="goToDash()" style="background:transparent;border:1px solid #d0c8b8;border-radius:20px;padding:5px 14px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer;color:#8a7a60;letter-spacing:.5px;transition:all .14s">⌂ Dashboard</button>
    </div>
    <div class="top-right">
      <span id="save-status">● saved</span>
      <span id="file-count"></span>
      <button onclick="exportData()" style="background:transparent;border:1px solid #d0c8b8;border-radius:20px;padding:5px 14px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer;color:#8a7a60;letter-spacing:.5px" title="Download a backup of all your data">⬇ Export</button>
      <label style="background:transparent;border:1px solid #d0c8b8;border-radius:20px;padding:5px 14px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer;color:#8a7a60;letter-spacing:.5px" title="Restore data from a backup file">⬆ Import<input type="file" accept=".json" onchange="importData(this)" style="display:none"/></label>
      <button class="btn-primary" onclick="openModal()">+ New File</button>
    </div>
  </div>
  <div id="body">
    <div id="sidebar"></div>
    <div id="main-scroll"><div id="main"></div></div>
  </div>
</div>

<div id="modal" class="overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>New Transaction File</h2>
    <p class="modal-sub">FILL IN WHAT YOU KNOW — EDIT ANYTIME</p>
    <div class="field-wrap"><label>PROPERTY ADDRESS</label><input class="fi" id="m-address" placeholder="123 Main St, Burbank CA…"/></div>
    <div class="field-wrap"><label>WE REPRESENT</label>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button id="m-rep-buyer" class="rep-btn active-buyer" onclick="setModalRep('buyer')">Buyer</button>
        <button id="m-rep-seller" class="rep-btn" onclick="setModalRep('seller')">Seller</button>
      </div>
    </div>
    <div class="field-wrap"><label>OUR CLIENT NAME</label><input class="fi" id="m-client" placeholder="Client name…"/></div>
    <div class="field-wrap"><label>OUR AGENT</label>
      <select class="fi" id="m-agent">
        <option value="">Select agent…</option>
        <optgroup label="Team Agents">
          <option>Nancy Gonzalez</option>
          <option>Ethan Plemmons</option>
          <option>Heather Savoy</option>
          <option>Jason Chinchilla</option>
          <option>Ki Contreras</option>
          <option>Maya Worthy</option>
          <option>Luke Simon</option>
          <option>Jennifer Landon</option>
        </optgroup>
        <optgroup label="Independent">
          <option>Casi Kneebone</option>
        </optgroup>
        <optgroup label="Referral">
          <option>Artur Aleksanyan</option>
          <option>Annie Mochrie</option>
        </optgroup>
        <option value="__other__">Other / Type name…</option>
      </select>
    </div>
    <div class="field-wrap" id="m-agent-custom-wrap" style="display:none"><label>AGENT NAME</label><input class="fi" id="m-agent-custom" placeholder="Agent name…"/></div>
    <div class="field-wrap"><label>PURCHASE PRICE</label><input class="fi" id="m-price" placeholder="$000,000"/></div>
    <div class="field-wrap"><label>ACCEPTANCE DATE</label><input class="fi" type="date" id="m-accept"/></div>
    <div class="field-wrap"><label>TARGET COE DATE</label><input class="fi" type="date" id="m-coe"/></div>
    <div class="modal-btns">
      <button class="btn-create" onclick="createTx()">Create File</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
/* ── LRG BROKERAGE INFO ── */
const LRG = {
  brokerageName: "Landon Realty Group",
  brokerageAddress: "4004 W Riverside Dr, Burbank CA 91505",
  brokerageDRE: "02057743",
  brokeragePhone: "(310) 582-5379",
  brokerageFax: "(888) 552-5075",
  brokerageEmail: "teamagent@lrgla.com",
  brokerageWeb: "LandonRealtyGroup.com / LRGLA.com",
  mlsFirm: "SR0168500",
  taxId: "47-4835860",
  brokerName: "Jennifer Landon",
  brokerDRE: "01281552",
  brokerEmail: "Jennifer@lrgla.com",
  brokerPhone: "(818) 613-1767",
  tcName: "Mia Hanada",
  tcEmail: "Mia@lrgla.com",
  agents: {

/* ── COMPUTED ── */
function allMS(tx){return[...MILESTONES,...(tx.customMilestones||[]).map(m=>({...m,hasDue:true,custom:true}))];}
function allGroups(tx){const b=[...new Set(MILESTONES.map(m=>m.group))];const c=(tx.customMilestones||[]).map(m=>m.group).filter(g=>!b.includes(g));return[...b,...c.filter((g,i,a)=>a.indexOf(g)===i)];}
function progTx(tx){const a=allMS(tx);const d=a.filter(m=>{const ms=tx.milestones[m.id];return ms&&ms.status==="done";}).length;return a.length?Math.round(d/a.length*100):0;}
function bmProg(tx){
  const allIds=[...BM_ITEMS.map(b=>b.id),...(tx.bmCustom||[]).map(b=>b.id)];
  const c=allIds.filter(id=>!!(tx.bmChecks||{})[id]).length;
  return{done:c,total:allIds.length};
}

function esc(s){s=s===null||s===undefined?"":(typeof s==="object"?JSON.stringify(s):String(s));return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function toYMD(d){if(!d)return"";return d.toISOString().slice(0,10);}
function fmtShort(d){if(!d)return"";return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function fmtCurrency(s){if(!s)return"";const n=parseFloat(String(s).replace(/[^0-9.]/g,""));if(isNaN(n))return s;return"$"+n.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0});}
function daysUntil(d){if(!d)return null;const t=new Date();t.setHours(0,0,0,0);return Math.round((new Date(d+"T00:00:00")-t)/86400000);}
function badge(ds,st){
  if(!ds||st==="done")return"";
  const d=daysUntil(ds);if(d===null)return"";
  let bg,c,t;
  if(d<0){bg="#f5e8e8";c="#8a3a3a";t=Math.abs(d)+"d overdue";}
  else if(d===0){bg="#fff3cd";c="#7a5a00";t="Due today";}
  else if(d<=3){bg="#fff3cd";c="#7a5a00";t=d+"d left";}
  else{bg="#eef4ee";c="#3a6644";t=d+"d left";}
  return`<span class="day-badge" style="background:${bg};color:${c};border:1px solid ${c}30">${t}</span>`;
}

function exportData(){
  try{
    const data=JSON.stringify({transactions:TXS,activeId:AID,view:VIEW,dashNotes:DASH_NOTES,exportedAt:new Date().toISOString()},null,2);
    const blob=new Blob([data],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const date=new Date().toISOString().slice(0,10);
    a.href=url;a.download="tc-tracker-backup-"+date+".json";
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
    const el=document.getElementById("save-status");
    el.textContent="✓ exported";el.style.color="#3a7a50";
    setTimeout(()=>{el.textContent="● saved";el.style.color="#90a880";},2500);

function importData(input){
  const file=input.files[0];if(!file)return;
  if(!confirm("Import this backup? Your current data will be replaced.\n\nFile: "+file.name))
    {input.value="";return;}
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const d=JSON.parse(e.target.result);
      if(!d.transactions||!Array.isArray(d.transactions))
        {alert("Invalid backup file — no transactions found.");input.value="";return;}
      localStorage.setItem(SK,JSON.stringify({transactions:d.transactions,activeId:d.activeId||null,view:d.view||"dash",dashNotes:d.dashNotes||""}));
      load();render();alert("Import successful!");
    }catch(err){alert("Could not parse backup file.");}
    input.value="";
  };
  reader.readAsText(file);
}

function sortTXS(){
  return [...TXS].sort((a,b)=>{
    if(a.cancellation?.cancelled && !b.cancellation?.cancelled) return 1;
    if(!a.cancellation?.cancelled && b.cancellation?.cancelled) return -1;
    const aP=(a.fileStatus==="pending")||!!a.coeDate;
    const bP=(b.fileStatus==="pending")||!!b.coeDate;
    if(aP&&!bP) return -1;
    if(!aP&&bP) return 1;
    if(aP&&bP){
      const ac=a.coeDate?new Date(a.coeDate+"T00:00:00"):new Date("9999-01-01");
      const bc=b.coeDate?new Date(b.coeDate+"T00:00:00"):new Date("9999-01-01");
      return ac-bc;
    }
    return (a.address||"").localeCompare(b.address||"");
  });
}

/* ── MILESTONE VISUAL TRACKER ── */
function rMilestoneTracker(tx){
  const groups=allGroups(tx);
  const allMs=allMS(tx);

  // For each group, compute overall group status
  const groupBlocks=groups.map(g=>{
    const gms=allMs.filter(m=>m.group===g);
    const statuses=gms.map(m=>(tx.milestones[m.id]||{}).status||"pending");
    const doneCount=statuses.filter(s=>s==="done").length;
    const total=gms.length;
    const allDone=doneCount===total;
    const anyBlocked=statuses.some(s=>s==="blocked");
    const anyInProgress=statuses.some(s=>s==="in_progress");
    const noneStarted=statuses.every(s=>s==="pending");

    let groupStatus="pending";
    if(allDone) groupStatus="done";
    else if(anyBlocked) groupStatus="blocked";
    else if(anyInProgress||doneCount>0) groupStatus="in_progress";

    const GC={
      done:      {ring:"#8a7a50",fill:"#8a7a50",text:"#fff",label:"#3a6644",sub:"#6a9a70"},
      in_progress:{ring:"#c4a840",fill:"#fff8e8",text:"#c4a840",label:"#7a6a40",sub:"#a09060"},
      blocked:   {ring:"#c07070",fill:"#f5e8e8",text:"#c07070",label:"#8a3a3a",sub:"#c07070"},
      pending:   {ring:"#d8d0c0",fill:"#faf7f2",text:"#c0b8a8",label:"#a09880",sub:"#c0b8a8"},
    };
    const gc=GC[groupStatus];

    // Individual milestone dots inside the group
    const dots=gms.map(m=>{
      const st=(tx.milestones[m.id]||{}).status||"pending";
      const DOT={
        done:      {bg:"#8a7a50",border:"#8a7a50",title:"Done"},
        in_progress:{bg:"#f5efd8",border:"#c4a840",title:"In Progress"},
        blocked:   {bg:"#f5e8e8",border:"#c07070",title:"Blocked"},
        pending:   {bg:"#f0ebe0",border:"#d8d0c0",title:"Pending"},
      };
      const dc=DOT[st];
      return`<div title="${esc(m.label)} — ${dc.title}" style="width:10px;height:10px;border-radius:50%;background:${dc.bg};border:1.5px solid ${dc.border};flex-shrink:0"></div>`;
    }).join("");

    const checkmark=allDone?`<span style="color:#fff;font-size:11px;font-weight:700;line-height:1">✓</span>`:
      anyBlocked?`<span style="color:#c07070;font-size:12px;font-weight:700;line-height:1">!</span>`:
      anyInProgress||doneCount>0?`<span style="font-size:9px;font-weight:700;color:${gc.text}">${doneCount}/${total}</span>`:
      `<span style="font-size:9px;color:#d0c8b8;font-weight:700">${total}</span>`;

    return{g,gms,groupStatus,gc,dots,checkmark,doneCount,total,allDone};
  });

  // Build the visual strip
  const strips=groupBlocks.map((b,i)=>{
    const isLast=i===groupBlocks.length-1;
    const connector=!isLast?`<div style="flex:1;height:2px;background:${b.allDone?"linear-gradient(90deg,#8a7a50,#c8b878)":"#e0d8c8"};margin:0 2px;align-self:center;min-width:8px"></div>`:"";
    return`<div style="display:flex;align-items:center;flex:1;min-width:0">
      <div style="display:flex;flex-direction:column;align-items:center;gap:5px;flex:0 0 auto;cursor:pointer" data-oc="swTab('milestones')" title="Go to ${esc(b.g)} milestones">
        <!-- Circle icon -->
        <div style="width:34px;height:34px;border-radius:50%;background:${b.gc.fill};border:2px solid ${b.gc.ring};display:flex;align-items:center;justify-content:center;box-shadow:${b.groupStatus==="in_progress"?"0 0 0 3px #c4a84020":b.groupStatus==="done"?"0 0 0 3px #8a7a5020":"none"};transition:all .2s">
          ${b.checkmark}
        </div>
        <!-- Group label -->
        <span style="font-size:9px;font-weight:700;color:${b.gc.label};letter-spacing:.4px;text-align:center;white-space:nowrap;max-width:64px;overflow:hidden;text-overflow:ellipsis">${b.g.toUpperCase()}</span>
        <!-- Mini dots row -->
        <div style="display:flex;gap:3px;flex-wrap:wrap;justify-content:center;max-width:64px">${b.dots}</div>
        <!-- Sub label -->
        <span style="font-size:8px;color:${b.gc.sub};font-weight:${b.groupStatus==="done"||b.groupStatus==="in_progress"?700:400}">${b.allDone?"Complete":b.groupStatus==="blocked"?"Blocked":b.doneCount>0?b.doneCount+"/"+b.total+" done":"Pending"}</span>
      </div>
      ${connector}
    </div>`;
  }).join("");

  // Find current active group
  const activeGroup=groupBlocks.find(b=>b.groupStatus==="in_progress")||
    groupBlocks.find(b=>b.groupStatus==="blocked")||
    groupBlocks.find(b=>!b.allDone);
  const activeLabel=activeGroup?`<span style="font-size:10px;color:#8a7a50;font-weight:700">Now: ${activeGroup.g}</span>`:"<span style='font-size:10px;color:#3a6644;font-weight:700'>✓ All complete</span>";

  return`<div style="background:#faf7f2;border:1px solid #e0d8c8;border-radius:12px;padding:16px 20px 14px;margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <span style="font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;font-style:italic;color:#4a4030">Milestone Progress</span>
      <div style="display:flex;align-items:center;gap:14px">
        ${activeLabel}
        <button data-oc="swTab('milestones')" style="font-size:10px;color:#8a7a60;background:none;border:1px solid #d0c8b8;border-radius:20px;padding:3px 12px;cursor:pointer;font-family:'Lato',sans-serif;font-weight:700">View All →</button>
      </div>
    </div>
    <div style="display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding-bottom:4px">
      ${strips}
    </div>
    <div style="display:flex;gap:14px;margin-top:10px;padding-top:8px;border-top:1px solid #ece4d8;flex-wrap:wrap">
      ${[["#8a7a50","Done"],["#c4a840","In Progress"],["#c07070","Blocked"],["#d8d0c0","Pending"]].map(([c,l])=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:50%;background:${c};border:1.5px solid ${c}"></div><span style="font-size:9px;color:#a09880;font-weight:700;letter-spacing:.3px">${l}</span></div>`).join("")}
    </div>
  </div>`;
}

  ${(()=>{
    // ── URGENT TASKS BLOCK ──
    const urgent=[];

    // Contingencies expiring ≤7 days or past
    if(tx.acceptDate){
      const acceptDt=new Date(tx.acceptDate+"T00:00:00");
      RPA_PERIODS.filter(p=>p.type==="contingency"||p.id==="buyer_disclosures_review").forEach(p=>{
        if((tx.waivedPeriods||{})[p.id])return;
        if((tx.periodDone||{})[p.id]?.done)return;
        const overrideDate=(tx.periodDates||{})[p.id];
        const overrideStart=(tx.periodStarts||{})[p.id];
        let endD;
        if(overrideDate){endD=new Date(overrideDate+"T00:00:00");}
        else{
          let startD=new Date(acceptDt);
          if(overrideStart)startD=new Date(overrideStart+"T00:00:00");
          endD=new Date(startD);endD.setDate(endD.getDate()+(tx.periods[p.id]??p.defaultDays));
        }
        const d=daysUntil(toYMD(endD));
        if(d!==null&&d<=7){
          const isOver=d<0;
          urgent.push({
            type:isOver?"overdue":"deadline",
            label:p.name,
            detail:isOver?`Expired ${fmtShort(toYMD(endD))} — ${Math.abs(d)}d ago`:`Expires ${fmtShort(toYMD(endD))}${d===0?" — TODAY":d===1?" — tomorrow":` — ${d}d`}`,
            bg:isOver?"#f5e8e8":"#fff8e8",
            border:isOver?"#d49090":"#d4c080",
            dot:isOver?"#c07070":"#c4a840",
            text:isOver?"#8a3a3a":"#7a5a00"
          });
        }
      });
    }

    // Blocked milestones
    allMS(tx).filter(m=>{const ms=tx.milestones[m.id];return ms&&ms.status==="blocked";}).forEach(m=>{
      urgent.push({type:"blocked",label:m.label,detail:"Blocked — needs attention",bg:"#f5e8e8",border:"#d49090",dot:"#c07070",text:"#8a3a3a"});
    });

    // Milestones due ≤3 days
    allMS(tx).filter(m=>{
      const ms=tx.milestones[m.id];
      if(!ms||ms.status==="done"||ms.status==="blocked"||!ms.dueDate)return false;
      const d=daysUntil(ms.dueDate);
      return d!==null&&d<=3&&d>=0;
    }).forEach(m=>{
      const ms=tx.milestones[m.id];
      const d=daysUntil(ms.dueDate);
      urgent.push({type:"milestone",label:m.label,detail:`Due ${fmtShort(ms.dueDate)}${d===0?" — TODAY":d===1?" — tomorrow":` — ${d}d`}`,bg:"#fff8e8",border:"#d4c080",dot:"#c4a840",text:"#7a5a00"});
    });

    // Open RR
    (tx.rrList||[]).filter(r=>r.status==="Pending"||r.status==="Submitted").forEach(r=>{
      urgent.push({type:"rr",label:"RR: "+(r.item||"Request for Repair"),detail:`${r.rrType||""}${r.amount?" — "+r.amount:""} — ${r.status}`,bg:"#f5f0e0",border:"#c8b870",dot:"#a09050",text:"#6a5a20"});
    });

    // Pending CR
    (tx.crList||[]).filter(r=>r.status==="Pending"||r.status==="Sent").forEach(r=>{
      urgent.push({type:"cr",label:"CR Pending: "+(r.contingency||"Contingency"),detail:r.date?"Sent "+fmtShort(r.date):"Awaiting removal",bg:"#e8f4e8",border:"#90c898",dot:"#5a9a6a",text:"#2a6a3a"});
    });

    // COE within 7 days
    if(tx.coeDate&&!tx.funded?.done){
      const cd=daysUntil(tx.coeDate);
      if(cd!==null&&cd<=7&&cd>0){
        urgent.push({type:"coe",label:"COE Approaching",detail:`${fmtShort(tx.coeDate)} — ${cd} day${cd!==1?"s":""} away`,bg:"#f0e8f8",border:"#b090c8",dot:"#8a60a8",text:"#4a2a68"});
      } else if(cd!==null&&cd===0){
        urgent.push({type:"coe",label:"COE TODAY",detail:fmtShort(tx.coeDate),bg:"#e8f0f8",border:"#7090c8",dot:"#5070a8",text:"#2a3a68"});
      } else if(cd!==null&&cd<0){
        urgent.push({type:"coe",label:"Past COE",detail:`${fmtShort(tx.coeDate)} — ${Math.abs(cd)}d ago`,bg:"#f5e8e8",border:"#d49090",dot:"#c07070",text:"#8a3a3a"});
      }
    }

    // Custom urgent items
    (tx.customUrgent||[]).forEach(u=>{
      urgent.push({type:"custom",label:u.text,detail:"Custom · added by you",bg:"#f0e8f8",border:"#b090c8",dot:"#8a60a8",text:"#4a2a68",id:u.id});
    });

    const allClear=!urgent.length;

    const chips=urgent.map(u=>`<div style="background:${u.bg};border:1px solid ${u.border};border-radius:8px;padding:9px 13px;display:flex;align-items:flex-start;gap:9px">
      <div style="width:8px;height:8px;border-radius:50%;background:${u.dot};flex-shrink:0;margin-top:3px"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;font-weight:700;color:${u.text}">${esc(u.label)}</div>
        <div style="font-size:10px;color:${u.text};opacity:.8;margin-top:1px">${esc(u.detail)}</div>
      </div>
      ${u.type==="custom"?`<button data-oc="rmCustomUrgent('${tx.id}','${u.id}')" style="background:none;border:none;color:#b090c8;cursor:pointer;font-size:14px;line-height:1;padding:0;flex-shrink:0">×</button>`:""}
    </div>`).join("");

    return`<div style="background:#faf7f2;border:1px solid #e0d8c8;border-radius:12px;padding:14px 16px;margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;font-style:italic;color:#4a4030">Urgent Tasks</span>
        <span style="font-size:9px;color:#b0a890;font-weight:700;letter-spacing:1px">${urgent.length} item${urgent.length!==1?"s":""} need${urgent.length===1?"s":""} attention</span>

      ${allClear?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><span style="font-size:16px">✓</span><span style="font-size:12px;color:#3a6644;font-weight:700">No urgent tasks — you're on top of this file!</span></div>`:""}
      ${chips?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;margin-bottom:10px">${chips}</div>`:""}
      <div style="display:flex;gap:8px;align-items:center;padding-top:8px;border-top:1px solid #ece4d8;flex-wrap:wrap">

  /* ── CONTINGENCY REMOVAL ── just date + which contingency + document confirmation */
  const crRows=(tx.crList||[]).map((r,i)=>{

/* ── BM TAB ── */
function rBM(tx){
  const checks=tx.bmChecks||{};
  const waived=tx.bmWaived||{};
  const notes=tx.bmNotes||{};
  const custom=tx.bmCustom||[];
  const allItems=[...BM_ITEMS,...custom.map(c=>({id:c.id,label:c.label,custom:true}))];
  const uploaded=allItems.filter(b=>!!checks[b.id]).length;
  const wv=allItems.filter(b=>!!waived[b.id]).length;
  const total=allItems.length;

  const items=allItems.map(b=>{
    const checked=!!checks[b.id];
    const isWaived=!!waived[b.id];
    const note=notes[b.id]||"";
    return`<div style="padding:8px 14px;border-bottom:1px solid #f0ebe0;${isWaived?"background:#f8f5f0;":""}${b.custom?"border-left:3px solid #d0c8b8;":""}">
      <div style="display:flex;align-items:center;gap:9px">
        <input type="checkbox" class="bm-cb" id="bmc_${b.id}" ${checked?"checked":""} ${isWaived?"disabled":""} onchange="setBM('${tx.id}','${b.id}',this.checked)" style="${isWaived?"opacity:.4":""}"/>
        <label for="bmc_${b.id}" style="font-size:11px;color:${isWaived?"#b0a890":checked?"#8a9a80":"#3a3020"};text-decoration:${isWaived||checked?"line-through":"none"};cursor:pointer;flex:1">${esc(b.label)}${b.custom?` <span style="font-size:8px;background:#ede8de;color:#8a7a60;border-radius:3px;padding:1px 4px;font-weight:700">custom</span>`:""}</label>
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer;flex-shrink:0">
          <input type="checkbox" ${isWaived?"checked":""} onchange="setBMWaived('${tx.id}','${b.id}',this.checked)" style="accent-color:#c8a050;width:12px;height:12px;cursor:pointer"/>
          <span style="font-size:9px;color:${isWaived?"#b08040":"#c0b8a8"};font-weight:700">N/A</span>
        </label>
        ${b.custom?`<button class="btn-rm-row" data-oc="rmBMCustom('${tx.id}','${b.id}')" style="font-size:12px;flex-shrink:0">×</button>`:""}
      </div>
      <input type="text" value="${esc(note)}" placeholder="Notes…" onchange="setBMNote('${tx.id}','${b.id}',this.value)" onblur="setBMNote('${tx.id}','${b.id}',this.value)"
        style="background:transparent;border:none;border-bottom:1px solid #ece4d8;font-family:'Lato',sans-serif;font-size:10px;color:#7a6a50;padding:2px 0 2px 24px;width:100%;margin-top:2px"/>
    </div>`;
  }).join("");

  return`<div class="sec">
    <div class="sec-hdr">
      <span class="sec-title">BM File Upload Checklist</span>
      <div style="display:flex;align-items:center;gap:12px">
        ${wv>0?`<span style="font-size:10px;color:#b08040;font-weight:700">${wv} N/A</span>`:""}
        <span style="font-size:11px;color:#8a7a50;font-weight:700">${uploaded} / ${total} uploaded</span>
      </div>
    </div>
    <div style="background:#faf7f2">
      <div style="padding:8px 18px 4px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #ece4d8">
        <div style="background:#e8e0d0;border-radius:6px;height:5px;flex:1"><div style="width:${total>0?Math.round(uploaded/total*100):0}%;height:5px;border-radius:6px;background:linear-gradient(90deg,#8a7a50,#b0a060);transition:width .4s"></div></div>
        <span style="font-size:10px;color:#8a7a60">${total>0?Math.round(uploaded/total*100):0}%</span>
      </div>
      <div style="padding:6px 14px;border-bottom:1px solid #ece4d8;display:flex;align-items:center;gap:6px;background:#f8f5f0;font-size:9px;color:#a09880">
        <span>☑ = Uploaded &nbsp;·&nbsp; N/A = Not applicable / waived</span>
      </div>
      ${items}
      <!-- Add custom BM item -->
      <div style="padding:10px 14px;border-top:1px solid #ece4d8;background:#f8f4ee;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span style="font-size:10px;color:#8a7a60;font-weight:700;white-space:nowrap">+ ADD DOCUMENT</span>
        <input class="fi-sm" id="new-bm-label" placeholder="Document name…" style="flex:1;min-width:160px" onkeydown="if(event.key==='Enter')addBMCustom('${tx.id}')"/>
        <button class="btn-add-rr" data-oc="addBMCustom('${tx.id}')">Add</button>
      </div>
    </div>
  </div>
  <!-- Page notes -->
  <div class="sec">
    <div class="sec-hdr"><span class="sec-title">BM Notes</span></div>
    <div class="sec-body">
      <textarea class="fi" rows="4" placeholder="General notes about this file's BM uploads, missing items, follow-ups…" onchange="setBMPageNotes('${tx.id}',this.value)" onblur="setBMPageNotes('${tx.id}',this.value)" style="resize:vertical">${esc(tx.bmPageNotes||"")}</textarea>
    </div>
  </div>`;
}

    const links=[];

    // Extra fields per vendor type
    const extraFields=key==="escrow"
      ?`<input class="fi" value="${esc(v.escrowNumber||"")}" placeholder="Escrow # …" onchange="setVendorField('${tx.id}','${key}','escrowNumber',this.value)" onblur="setVendorField('${tx.id}','${key}','escrowNumber',this.value)" style="margin-bottom:7px"/>`
      :key==="warranty"
      ?`<input class="fi" value="${esc(v.cost||"")}" placeholder="Cost $ …" onchange="setVendorField('${tx.id}','${key}','cost',this.value)" onblur="setVendorField('${tx.id}','${key}','cost',this.value)" style="margin-bottom:7px"/>`
      :"";
    return`<div class="vendor-card${isCustom?" custom-card":""}">
      <div class="vendor-title-row">
        <span class="vendor-title">${esc(label).toUpperCase()}</span>
        ${isCustom?`<button class="btn-rm-row" data-oc="rmCustomVendor('${tx.id}','${key}')" style="font-size:15px">×</button>`:""}
      </div>
      ${["name","company","phone","email"].map(f=>`<input class="fi" value="${esc(v[f]||"")}" placeholder="${f.charAt(0).toUpperCase()+f.slice(1)}…" onchange="setVendorField('${tx.id}','${key}','${f}',this.value)" onblur="setVendorField('${tx.id}','${key}','${f}',this.value)" style="margin-bottom:7px"/>`).join("")}
      ${extraFields}
      <textarea class="fi" rows="2" placeholder="Notes…" onchange="setVendorField('${tx.id}','${key}','notes',this.value)" onblur="setVendorField('${tx.id}','${key}','notes',this.value)" style="resize:vertical">${esc(v.notes||"")}</textarea>
      ${links.length?`<div class="vendor-links">${links.join("")}</div>`:""}
    </div>`;
  }
  const baseCards=BASE_VENDORS.map(v=>vCard(v.key,v.label,tx.vendors[v.key]||{},false)).join("");
  const customCards=(tx.customVendors||[]).map(cv=>vCard(cv.id,cv.label,cv,true)).join("");
  const addForm=`<div class="add-vendor-card">
    <span class="flabel" style="margin-bottom:0">+ ADD VENDOR / CONTACT</span>
    <input class="fi-sm" id="new-v-label" placeholder="Role / Title (e.g. HOA Manager, Inspector)…" style="width:100%"/>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input class="fi-sm" id="new-v-name" placeholder="Name…" style="flex:1 1 120px"/>
      <input class="fi-sm" id="new-v-phone" placeholder="Phone…" style="flex:1 1 120px"/>
      <input class="fi-sm" id="new-v-email" placeholder="Email…" style="flex:1 1 160px"/>
    </div>
    <button class="btn-add-rr" data-oc="addCustomVendor('${tx.id}')">Add Vendor</button>
  </div>`;
  return`<div class="vendors-grid">${baseCards}${customCards}${addForm}</div>`;
}

/* ── MILESTONES TAB ── */
function rMilestones(tx){
  const groups=allGroups(tx);
  const allMs=allMS(tx);
  const groupOptions=groups.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join("")+`<option value="__new__">+ New group…</option>`;
  const msRows=groups.map(g=>{
    const gms=allMs.filter(m=>m.group===g);
    if(!gms.length)return"";
    const rows=gms.map(m=>{
      const ms=tx.milestones[m.id]||{status:"pending",dueDate:"",notes:""};
      const sc=ST[ms.status],done=ms.status==="done";
      const btns=Object.entries(ST).map(([s,sc2])=>`<button class="sbtn" data-oc="setSt('${tx.id}','${m.id}','${s}')" style="background:${ms.status===s?sc2.bg:"transparent"};border:1px solid ${ms.status===s?sc2.border:"#d8d0c0"};color:${ms.status===s?sc2.color:"#b0a890"};font-weight:${ms.status===s?700:400}">${sc2.label}</button>`).join("");
      const di=m.hasDue?`<input type="date" class="date-input" value="${esc(ms.dueDate)}" onchange="setDD('${tx.id}','${m.id}',this.value)"/>`:"";
      const bd=m.hasDue?badge(ms.dueDate,ms.status):"";
      const rmBtn=m.custom?`<button class="btn-rm-row" data-oc="rmCustomMs('${tx.id}','${m.id}')" style="font-size:14px">×</button>`:"";
      const customTag=m.custom?`<span class="custom-badge">custom</span>`:"";
      return`<div class="ms-row${done?" done-row":""}">
        <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="ms-dot2" style="background:${sc.border}"></div>
            <span style="font-size:12px;color:${done?"#6a9a70":"#3a3020"};text-decoration:${done?"line-through":"none"}">${esc(m.label)}${customTag}</span>
          </div>
          <input type="text" value="${esc(ms.notes||"")}" placeholder="Notes…" onchange="setMsNote('${tx.id}','${m.id}',this.value)" onblur="setMsNote('${tx.id}','${m.id}',this.value)" style="background:transparent;border:none;border-bottom:1px solid #ece4d8;font-family:'Lato',sans-serif;font-size:10px;color:#7a6a50;padding:1px 0 2px 16px;width:100%;max-width:400px"/>
        </div>
        <div class="ms-right">${di}${bd}${btns}${rmBtn}</div>
      </div>`;
    }).join("");
    return`<div class="grp-lbl">${g.toUpperCase()}</div>${rows}`;
  }).join("");
  const addBar=`<div class="add-ms-bar">
    <span style="font-size:10px;color:#8a7a60;font-weight:700;white-space:nowrap">+ ADD MILESTONE</span>
    <input class="add-ms-input" id="new-ms-label" placeholder="Milestone name…" onkeydown="if(event.key==='Enter')addCustomMs('${tx.id}')"/>
    <select class="add-ms-select" id="new-ms-group">${groupOptions}</select>
    <input class="add-ms-input" id="new-ms-group-custom" placeholder="New group name…" style="display:none;max-width:140px"/>
    <button style="background:#3a3020;color:#f5f0e8;border:none;border-radius:20px;padding:6px 16px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer" data-oc="addCustomMs('${tx.id}')">Add</button>
  </div>`;
  return`<div class="ms-wrap"><div class="ms-hdr"><span>MILESTONE</span><span>DUE DATE · STATUS</span></div>${msRows}${addBar}</div>`;
}

/* ── GANTT ── */
function rGantt(tx){
  const accept=tx.acceptDate,coe=tx.coeDate;
  if(!accept)return'<div id="gantt-section"><div class="gantt-header"><span class="gantt-title">CA RPA Contract Timeline</span><div style="display:flex;align-items:center;gap:8px"><label class="flabel" style="margin-bottom:0">ACCEPTANCE DATE</label><input type="date" class="fi-sm" value="" onchange="setFrender(\''+tx.id+'\',\'acceptDate\',this.value)"/></div></div><div class="gantt-notice">Set an acceptance date above to generate the contractual timeline.</div></div>';
  const acceptDt=new Date(accept+"T00:00:00");
  const coeDt=coe?new Date(coe+"T00:00:00"):null;
  const totalDays=coeDt?Math.max(Math.round((coeDt-acceptDt)/86400000)+3,35):35;
  const days=[];for(let i=0;i<=totalDays;i++){const d=new Date(acceptDt);d.setDate(d.getDate()+i);days.push(d);}
  const today=new Date();today.setHours(0,0,0,0);
  const todayOff=Math.round((today-acceptDt)/86400000);
  const coeOff=coeDt?Math.round((coeDt-acceptDt)/86400000):null;
  const CW=Math.max(22,Math.floor(660/days.length));

  // Build date header cells
  var dayHdrParts=[];
  days.forEach(function(d,i){
    var isT=(i===todayOff);
    var isCoeDay=(coeOff!==null&&i===coeOff);
    var isWE=d.getDay()===0||d.getDay()===6;
    var showLbl=i===0||d.getDate()===1||isT||isCoeDay||(i%3===0);
    var lbl=showLbl?d.toLocaleDateString("en-US",{month:"short",day:"numeric"}):"";
    var cls="gantt-day-cell"+(isWE&&!isCoeDay&&!isT?" weekend":"");
    var st="min-width:"+CW+"px;";
    if(isCoeDay) st+="background:#e8e0d0;font-weight:700;color:#2a2010;font-size:8px;border-left:2px solid #8a7a50;";
    else if(isT) st+="background:#e8e0d0;color:#2a2010;font-size:8px;font-weight:700;border-left:2px solid #3a3020;";
    else st+="font-size:8px;";
    var todayLbl=isT?'<div style="font-size:7px;background:#3a3020;color:#f5f0e8;border-radius:2px;padding:1px 3px;white-space:nowrap;margin-top:1px">TODAY</div>':"";
    var coeLbl=(isCoeDay&&!isT)?'<div style="font-size:7px;color:#8a7a50;font-weight:700">COE</div>':"";
    dayHdrParts.push('<div class="'+cls+'" style="'+st+'">'+lbl+todayLbl+coeLbl+'</div>');
  });
  var dayHdr=dayHdrParts.join("");

  // Build rows
  var rowParts=[];
  RPA_PERIODS.forEach(function(p){
    var dc=tx.periods[p.id]!==undefined?tx.periods[p.id]:p.defaultDays;
    var isWaived=!!((tx.waivedPeriods||{})[p.id]);
    var isCoe=p.type==="coe";
    var overrideDate=(tx.periodDates||{})[p.id]||"";
    var overrideStart=(tx.periodStarts||{})[p.id]||"";
    var pNote=(tx.periodNotes||{})[p.id]||"";
    var startD,endD;
    if(p.anchoredToCOE&&coeDt){
      if(isCoe){startD=endD=new Date(coeDt);}
      else{startD=new Date(coeDt);startD.setDate(startD.getDate()+p.startDayFromCOE);endD=new Date(coeDt);endD.setDate(endD.getDate()-1);}
    }else{
      startD=new Date(acceptDt);startD.setDate(startD.getDate()+(p.startDay||0));
      endD=new Date(acceptDt);endD.setDate(endD.getDate()+dc);
    }
    // Apply start date override
    if(overrideStart&&!p.anchoredToCOE){
      var newStart=new Date(overrideStart+"T00:00:00");
      // Recalculate end based on new start + duration (unless end is also overridden)
      if(!overrideDate){endD=new Date(newStart);endD.setDate(endD.getDate()+dc);}
      startD=newStart;
    }
    if(overrideDate){endD=new Date(overrideDate+"T00:00:00");}
    var sOff=Math.round((startD-acceptDt)/86400000);
    var eOff=Math.round((endD-acceptDt)/86400000);
    var deadlineDate=overrideDate||toYMD(endD);
    var dU=daysUntil(deadlineDate);
    var doneData=(tx.periodDone||{})[p.id]||{};
    var isDone=!!doneData.done;
    var doneDate=doneData.date||"";
    var urgency="";
    if(!isWaived&&!isDone&&dU!==null){
      if(dU<0) urgency='<span style="color:#8a3a3a;font-size:9px;font-weight:700"> &middot; '+Math.abs(dU)+'d PAST</span>';
      else if(dU===0) urgency='<span style="color:#2a2010;font-size:9px;font-weight:700;background:#e0d8c0;padding:1px 5px;border-radius:3px"> TODAY</span>';
      else if(dU<=3) urgency='<span style="color:#7a5a00;font-size:9px;font-weight:700"> &middot; '+dU+'d</span>';
    }
    if(isDone) urgency='<span style="color:#3a6644;font-size:9px;font-weight:700;background:#e8f0e8;padding:1px 6px;border-radius:3px;margin-left:4px">&#10003; done'+(doneDate?' '+fmtShort(doneDate):'')+'</span>';

    // Bar cells
    var cellParts=[];
    days.forEach(function(_,i){
      var isT=(i===todayOff);
      var isCBD=(coeOff!==null&&i===coeOff);
      var st=isT?"min-width:"+CW+"px;background:#ede8de;border-left:2px solid #3a3020;"
        :isCBD?"min-width:"+CW+"px;background:#e8e0d0;border-left:2px solid #8a7a50;"
        :"min-width:"+CW+"px;";
      cellParts.push('<div class="gantt-bar-cell" style="'+st+'"></div>');
    });
    var barCells=cellParts.join("");

    // Bar positioning — percentage based so it aligns with flex cells
    var totalCols=days.length;
    var sCol=Math.max(0,Math.min(sOff,totalCols-1));
    var eCol=Math.min(totalCols-1,eOff);
    var sPct=(sCol/totalCols*100).toFixed(4);
    var wPct=((eCol-sCol+1)/totalCols*100).toFixed(4);
    var coeColPx=Math.min(totalCols-1,eOff);
    var coePct=(coeColPx/totalCols*100).toFixed(4);
    var coeWPct=(1/totalCols*100).toFixed(4);
    var barStyle;
    if(isCoe) barStyle="left:"+coePct+"%;width:"+coeWPct+"%;background:"+p.color+";color:"+p.textColor+";border:2px solid #6a5a30";
    else if(isWaived) barStyle="left:"+sPct+"%;width:"+wPct+"%;background:#e8e0d0;color:#b0a890;border:1px dashed #c0b8a8;text-decoration:line-through";
    else if(isDone) barStyle="left:"+sPct+"%;width:"+wPct+"%;background:#c0d8c0;color:#2a5a3a;opacity:.7";
    else barStyle="left:"+sPct+"%;width:"+wPct+"%;background:"+p.color+"cc;color:"+p.textColor;
    var barLabel=isCoe?"COE":(parseFloat(wPct)>5?(isWaived?p.name+" \u2014 WAIVED":isDone?p.name+" \u2713":p.name):"");

    // Label column controls
    var daysCtrl="";
    if(!isCoe){
      if(isWaived){
        daysCtrl='<div class="gantt-row-days-input"><span style="font-size:9px;color:#b0a890;font-style:italic">waived</span></div>';
      }else if(!p.anchoredToCOE){
        daysCtrl='<div class="gantt-row-days-input"><input type="number" class="days-input" value="'+dc+'" min="1" max="99" onchange="setPeriod(\''+tx.id+'\',\''+p.id+'\',this.value)" title="Edit contract days"/><span class="days-label">days</span></div>';
      }else{
        daysCtrl='<div class="gantt-row-days-input"></div>';
      }
      var ovBorderColor=overrideDate?"#8a7a50":"#d8d0c0";
      var ovTextColor=overrideDate?"#3a3020":"#c0b8a8";
      var ovExtra=overrideDate
        ?'<button data-oc="setPeriodDate(\''+tx.id+'\',\''+p.id+'\',\'\')" style="background:none;border:none;color:#c0a898;cursor:pointer;font-size:11px;line-height:1;padding:0" title="Clear override">\xd7</button><span style="font-size:9px;color:#8a7a50;font-weight:700">adjusted</span>'
        :'<span style="font-size:9px;color:#c0b8a8">end date</span>';
      daysCtrl+='<div style="margin-top:3px;display:flex;align-items:center;gap:4px"><input type="date" style="background:#f0ebe0;border:1px solid '+ovBorderColor+';border-radius:5px;color:'+ovTextColor+';padding:2px 5px;font-size:9px;font-family:\'Lato\',sans-serif;width:110px" value="'+esc(overrideDate)+'" onchange="setPeriodDate(\''+tx.id+'\',\''+p.id+'\',this.value)" title="Override end/deadline date"/>'+ovExtra+'</div>';
      // Start date override (only for non-COE-anchored periods)
      if(!p.anchoredToCOE){
        var soBorderColor=overrideStart?"#6a8a7a":"#d8d0c0";
        var soTextColor=overrideStart?"#3a3020":"#c0b8a8";
        var soExtra=overrideStart
          ?'<button data-oc="setPeriodStart(\''+tx.id+'\',\''+p.id+'\',\'\')" style="background:none;border:none;color:#c0a898;cursor:pointer;font-size:11px;line-height:1;padding:0" title="Clear start override">\xd7</button><span style="font-size:9px;color:#6a8a7a;font-weight:700">start adjusted</span>'
          :'<span style="font-size:9px;color:#c0b8a8">start date</span>';
        daysCtrl+='<div style="margin-top:3px;display:flex;align-items:center;gap:4px"><input type="date" style="background:#f0ebe0;border:1px solid '+soBorderColor+';border-radius:5px;color:'+soTextColor+';padding:2px 5px;font-size:9px;font-family:\'Lato\',sans-serif;width:110px" value="'+esc(overrideStart)+'" onchange="setPeriodStart(\''+tx.id+'\',\''+p.id+'\',this.value)" title="Override start date"/>'+soExtra+'</div>';
      }
    }else{
      daysCtrl='<div class="gantt-row-days-input"><span class="days-label">COE</span></div>';
    }

    var waivedChk="";
    if(!isCoe){
      var wChk=isWaived?'checked':'';
      var wColor=isWaived?"#8a7a50":"#c0b8a8";
      waivedChk='<label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin-top:4px;width:fit-content"><input type="checkbox" '+wChk+' onchange="setWaived(\''+tx.id+'\',\''+p.id+'\',this.checked)" style="accent-color:#8a7a50;width:12px;height:12px;cursor:pointer"/><span style="font-size:9px;color:'+wColor+';font-weight:700;letter-spacing:.3px">WAIVED</span></label>';
    }

    // Done checkbox — shown for all non-COE periods
    var doneChk="";
    if(!isCoe&&!isWaived){
      var dChk=isDone?'checked':'';
      var dColor=isDone?"#3a6644":"#c0b8a8";
      doneChk='<label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin-top:2px;width:fit-content"><input type="checkbox" '+dChk+' onchange="setPeriodDone(\''+tx.id+'\',\''+p.id+'\',this.checked)" style="accent-color:#3a6644;width:12px;height:12px;cursor:pointer"/><span style="font-size:9px;color:'+dColor+';font-weight:700;letter-spacing:.3px">DONE</span></label>';
    }

    var notesHtml='<input type="text" style="background:transparent;border:none;border-bottom:1px solid #e8e0d0;width:100%;font-size:9px;font-family:\'Lato\',sans-serif;color:#8a7a60;padding:2px 0;margin-top:4px" value="'+esc(pNote)+'" placeholder="Notes\u2026" onchange="setPeriodNote(\''+tx.id+'\',\''+p.id+'\',this.value)" onblur="setPeriodNote(\''+tx.id+'\',\''+p.id+'\',this.value)"/>';

    var rowBg=isWaived?"background:#f8f5f0":isDone?"background:#f2f7f2":"";
    var nameStyle=isWaived?"color:#b0a890;text-decoration:line-through":isDone?"color:#4a7a5a":"color:#3a3020";
    var subStyle=isWaived?"color:#c8c0b0":isDone?"color:#6a9a78":"color:#a09880";
    var adjBadge=overrideDate&&!isWaived?'<span style="font-size:8px;background:#f5f0e0;color:#8a7a50;border:1px solid #c8b870;border-radius:3px;padding:1px 5px;font-weight:700;margin-left:4px">ADJUSTED</span>':"";
    var subContent=isWaived?"&mdash;":fmtShort(toYMD(startD))+" &rarr; <strong>"+fmtShort(deadlineDate)+"</strong>"+urgency;

    rowParts.push(
      '<div class="gantt-row" style="'+rowBg+'">'+
        '<div class="gantt-row-label" style="height:auto;padding-bottom:6px">'+
          '<div class="gantt-row-name" style="'+nameStyle+'">'+p.name+adjBadge+'</div>'+
          '<div class="gantt-row-sub" style="'+subStyle+'">'+subContent+'</div>'+
          daysCtrl+waivedChk+doneChk+notesHtml+
        '</div>'+
        '<div class="gantt-bar-area">'+barCells+'<div class="gantt-bar" style="'+barStyle+'">'+barLabel+'</div></div>'+
      '</div>'
    );
  });

  // Custom periods
  (tx.customPeriods||[]).forEach(function(cp){
    var cpId=cp.id;
    var isWaived=!!((tx.waivedPeriods||{})[cpId]);
    var doneData=(tx.periodDone||{})[cpId]||{};
    var isDone=!!doneData.done;
    var doneDate=doneData.date||"";
    var overrideDate=(tx.periodDates||{})[cpId]||"";
    var overrideStart=(tx.periodStarts||{})[cpId]||"";
    var pNote=(tx.periodNotes||{})[cpId]||"";
    var dc=tx.periods[cpId]!==undefined?tx.periods[cpId]:cp.defaultDays||7;
    var startDays=cp.startDay||0;
    var startD=new Date(acceptDt);startD.setDate(startD.getDate()+startDays);
    var endD=new Date(acceptDt);endD.setDate(endD.getDate()+startDays+dc);
    if(overrideStart){
      var newStart=new Date(overrideStart+"T00:00:00");
      if(!overrideDate){endD=new Date(newStart);endD.setDate(endD.getDate()+dc);}
      startD=newStart;
    }
    if(overrideDate){endD=new Date(overrideDate+"T00:00:00");}
    var sOff=Math.round((startD-acceptDt)/86400000);
    var eOff=Math.round((endD-acceptDt)/86400000);
    var deadlineDate=overrideDate||toYMD(endD);
    var dU=daysUntil(deadlineDate);
    var urgency="";
    if(!isWaived&&!isDone&&dU!==null){
      if(dU<0) urgency='<span style="color:#8a3a3a;font-size:9px;font-weight:700"> &middot; '+Math.abs(dU)+'d PAST</span>';
      else if(dU===0) urgency='<span style="color:#2a2010;font-size:9px;font-weight:700;background:#e0d8c0;padding:1px 5px;border-radius:3px"> TODAY</span>';
      else if(dU<=3) urgency='<span style="color:#7a5a00;font-size:9px;font-weight:700"> &middot; '+dU+'d</span>';
    }
    if(isDone) urgency='<span style="color:#3a6644;font-size:9px;font-weight:700;background:#e8f0e8;padding:1px 6px;border-radius:3px;margin-left:4px">&#10003; done'+(doneDate?' '+fmtShort(doneDate):'')+'</span>';

    var cellParts=[];
    days.forEach(function(_,i){
      var isT=(i===todayOff);
      var isCBD=(coeOff!==null&&i===coeOff);
      var st=isT?"min-width:"+CW+"px;background:#ede8de;border-left:2px solid #3a3020;"
        :isCBD?"min-width:"+CW+"px;background:#e8e0d0;border-left:2px solid #8a7a50;"
        :"min-width:"+CW+"px;";
      cellParts.push('<div class="gantt-bar-cell" style="'+st+'"></div>');
    });
    var barCells=cellParts.join("");
    var totalCols=days.length;
    var sCol=Math.max(0,Math.min(sOff,totalCols-1));
    var eCol=Math.min(totalCols-1,eOff);
    var sPct=(sCol/totalCols*100).toFixed(4);
    var wPct=((eCol-sCol+1)/totalCols*100).toFixed(4);
    var cpColor=cp.color||"#c8b8d0";
    var cpTextColor=cp.textColor||"#3a2848";
    var barStyle;
    if(isWaived) barStyle="left:"+sPct+"%;width:"+wPct+"%;background:#e8e0d0;color:#b0a890;border:1px dashed #c0b8a8;text-decoration:line-through";
    else if(isDone) barStyle="left:"+sPct+"%;width:"+wPct+"%;background:#c0d8c0;color:#2a5a3a;opacity:.7";
    else barStyle="left:"+sPct+"%;width:"+wPct+"%;background:"+cpColor+"cc;color:"+cpTextColor;
    var barLabel=parseFloat(wPct)>5?(isWaived?cp.name+" \u2014 WAIVED":isDone?cp.name+" \u2713":cp.name):"";

    var daysCtrlCp='<div class="gantt-row-days-input">'+(isWaived?'<span style="font-size:9px;color:#b0a890;font-style:italic">waived</span>':'<input type="number" class="days-input" value="'+dc+'" min="1" max="99" onchange="setPeriod(\''+tx.id+'\',\''+cpId+'\',this.value)" title="Edit days"/><span class="days-label">days</span>')+'</div>';

    var soBC=overrideStart?"#6a8a7a":"#d8d0c0";

    var wChk=isWaived?'checked':'';var wCol=isWaived?"#8a7a50":"#c0b8a8";

    var dChk=isDone?'checked':'';var dCol=isDone?"#3a6644":"#c0b8a8";
    var doneCpChk='<label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin-top:2px;width:fit-content"><input type="checkbox" '+dChk+' onchange="setPeriodDone(\''+tx.id+'\',\''+cpId+'\',this.checked)" style="accent-color:#3a6644;width:12px;height:12px;cursor:pointer"/><span style="font-size:9px;color:'+dCol+';font-weight:700">DONE</span></label>';
    var notesCp='<input type="text" style="background:transparent;border:none;border-bottom:1px solid #e8e0d0;width:100%;font-size:9px;font-family:\'Lato\',sans-serif;color:#8a7a60;padding:2px 0;margin-top:4px" value="'+esc(pNote)+'" placeholder="Notes\u2026" onchange="setPeriodNote(\''+tx.id+'\',\''+cpId+'\',this.value)" onblur="setPeriodNote(\''+tx.id+'\',\''+cpId+'\',this.value)"/>';

          '<div class="gantt-row-name" style="color:#3a3020">'+esc(cp.name)+customTag+adjBadgeCp+'</div>'+
          '<div class="gantt-row-sub" style="color:#a09880">'+subCp+'</div>'+
          daysCtrlCp+waivedCpChk+doneCpChk+notesCp+rmBtn+
        '</div>'+
        '<div class="gantt-bar-area">'+barCells+'<div class="gantt-bar" style="'+barStyle+'">'+barLabel+'</div></div>'+
      '</div>'
    );
  });

  var rows=rowParts.join("");

  // Add Period form at bottom of grid
  var addPeriodRow='<div style="display:flex;align-items:center;gap:8px;padding:10px 18px;border-top:1px solid #ece4d8;background:#f8f4ee;flex-wrap:wrap">'+
    '<span style="font-size:10px;color:#8a7a60;font-weight:700;white-space:nowrap">+ ADD PERIOD</span>'+
    '<input id="cp-name-'+tx.id+'" class="fi-sm" placeholder="Period name\u2026" style="flex:1 1 140px;min-width:100px"/>'+
    '<input id="cp-days-'+tx.id+'" type="number" class="days-input" value="7" min="1" max="99" title="Duration in days" style="width:46px"/>'+
    '<span class="days-label">days</span>'+
    '<button data-oc="addCustomPeriod(\''+tx.id+'\')" style="background:#3a3020;color:#f5f0e8;border:none;border-radius:20px;padding:5px 14px;font-size:10px;font-family:\'Lato\',sans-serif;font-weight:700;cursor:pointer">Add</button>'+
  '</div>';

  return'<div id="gantt-section">'+
    '<div class="gantt-header">'+
      '<div><span class="gantt-title">CA RPA Contract Timeline</span><div style="font-size:9px;color:#a09880;margin-top:3px">Acceptance: <strong>'+fmtShort(accept)+'</strong>'+(coe?' &middot; COE: <strong>'+fmtShort(coe)+'</strong>':'')+' &middot; '+(coeDt?Math.round((coeDt-acceptDt)/86400000):"?")+" days</div></div>"+
      '<div style="display:flex;align-items:center;gap:8px"><label class="flabel" style="margin-bottom:0">ACCEPTANCE DATE</label><input type="date" class="fi-sm" value="'+esc(accept)+'" onchange="setFrender(\''+tx.id+'\',\'acceptDate\',this.value)"/></div>'+
    '</div>'+
    '<div class="gantt-legend">'+
      '<div class="leg-item"><div class="leg-swatch" style="background:#a8c4a0cc"></div>CONTINGENCY</div>'+
      '<div class="leg-item"><div class="leg-swatch" style="background:#d4a96acc"></div>DISCLOSURE</div>'+
      '<div class="leg-item"><div class="leg-swatch" style="background:#e8a890cc"></div>DEPOSIT</div>'+
      '<div class="leg-item"><div class="leg-swatch" style="background:#8a7a50;border:2px solid #6a5a30"></div>COE</div>'+
      '<div class="leg-item"><div class="leg-swatch" style="background:#3a3020;width:2px"></div>TODAY</div>'+
      '<div class="leg-item"><div class="leg-swatch" style="background:#e8e0d0;border:1px dashed #c0b8a8"></div>WAIVED</div>'+
      '<div class="leg-item"><div class="leg-swatch" style="background:#c0d8c0"></div>DONE</div>'+
      '<div class="leg-item"><div class="leg-swatch" style="background:#c8b8d0cc"></div>CUSTOM</div>'+
    '</div>'+
    '<div class="gantt-scroll"><div class="gantt-grid">'+
      '<div style="display:flex"><div style="width:210px;flex-shrink:0"></div><div style="flex:1;display:flex;border-bottom:1px solid #e8e0d0;position:relative">'+dayHdr+'</div></div>'+
      rows+
      addPeriodRow+
    '</div></div>'+
  '</div>';
}

function rChecklistTab(tx, itemGroups, checksKey, notesKey){
  const checks=tx[checksKey]||{};
  const notes=tx[notesKey]||{};
  const labelsKey=checksKey+'Labels'; // e.g. discChecksLabels
  const customKey=checksKey+'Custom'; // e.g. discChecksCustom
  const labels=tx[labelsKey]||{};
  const custom=tx[customKey]||[];

  let total=0,done=0,na=0;
  itemGroups.forEach(g=>g.items.forEach(i=>{
    const c=checks[i.id]||{};
    if(c.na)na++;else{total++;if(c.done)done++;}
  }));
  custom.forEach(i=>{const c=checks[i.id]||{};if(c.na)na++;else{total++;if(c.done)done++;}});
  const pct=total?Math.round(done/total*100):0;

  const sections=itemGroups.map(g=>{
    const rows=g.items.map(i=>{
      const c=checks[i.id]||{};
      const lbl=labels[i.id]||i.label;
      return`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 16px;border-bottom:1px solid #f0ebe0;background:${c.na?"#faf8f5":c.done?"#f5faf5":"#faf7f2"}">
        <input type="checkbox" style="width:14px;height:14px;accent-color:#8a7a50;cursor:pointer;flex-shrink:0;margin-top:2px" ${c.done?"checked":""} ${c.na?"disabled":""} onchange="setClCheck('${tx.id}','${checksKey}','${i.id}',this.checked)"/>
        <div style="flex:1;min-width:0">
          <input type="text" style="font-size:11px;color:${c.na?"#b0a890":c.done?"#8a9a80":"#3a3020"};text-decoration:${c.na||c.done?"line-through":"none"};background:transparent;border:none;border-bottom:1px dashed ${labels[i.id]?"#c8b870":"transparent"};width:100%;font-family:'Lato',sans-serif;padding:1px 0;line-height:1.4" value="${esc(lbl)}" title="Click to edit label" onchange="setClLabel('${tx.id}','${labelsKey}','${i.id}',this.value)" onblur="setClLabel('${tx.id}','${labelsKey}','${i.id}',this.value)"/>
          ${labels[i.id]?`<div style="font-size:8px;color:#b08840;margin-top:1px">✎ edited · <button data-oc="setClLabel('${tx.id}','${labelsKey}','${i.id}','')" style="background:#fff3e0;border:1px solid #d4a840;border-radius:8px;color:#8a5a00;cursor:pointer;font-size:8px;padding:2px 7px;font-family:'Lato',sans-serif;font-weight:700">↩ restore original</button></div>`:""}
          <div style="display:flex;gap:5px;margin-top:5px;flex-wrap:wrap">
            <button data-oc="setClSign('${tx.id}','${checksKey}','${i.id}','seller')" style="cursor:pointer;padding:2px 9px;font-size:9px;font-family:'Lato',sans-serif;font-weight:700;border-radius:20px;border:1px solid ${c.seller?"#3a6644":"#c0c8b8"};background:${c.seller?"#2a5a34":"transparent"};color:${c.seller?"#fff":"#7a9070"};white-space:nowrap">${c.seller?"✓ Seller":"Seller"}</button>
            <button data-oc="setClSign('${tx.id}','${checksKey}','${i.id}','buyer')" style="cursor:pointer;padding:2px 9px;font-size:9px;font-family:'Lato',sans-serif;font-weight:700;border-radius:20px;border:1px solid ${c.buyer?"#1a3a5c":"#b8c0cc"};background:${c.buyer?"#1a3a5c":"transparent"};color:${c.buyer?"#fff":"#6070a0"};white-space:nowrap">${c.buyer?"✓ Buyer":"Buyer"}</button>
          </div>
          ${c.done&&c.date?`<div style="font-size:9px;color:#3a6644;font-weight:700;margin-top:3px">✓ ${fmtShort(c.date)}</div>`:""}
          <input type="text" style="background:transparent;border:none;border-bottom:1px solid #ece4d8;width:100%;font-family:'Lato',sans-serif;font-size:10px;color:#7a6a50;padding:2px 0;margin-top:3px" value="${esc((notes[i.id]?.note!==undefined?notes[i.id].note:notes[i.id])||"")}" placeholder="Notes…" onchange="setClNote('${tx.id}','${notesKey}','${i.id}',this.value)" onblur="setClNote('${tx.id}','${notesKey}','${i.id}',this.value)"/>
        </div>
        <button style="font-size:9px;color:${c.na?"#b08040":"#c0b8a8"};font-weight:700;cursor:pointer;padding:2px 7px;border:1px solid ${c.na?"#d4c080":"#e0d8c8"};border-radius:10px;background:${c.na?"#fff8e8":"transparent"};flex-shrink:0;white-space:nowrap" data-oc="setClNA('${tx.id}','${checksKey}','${i.id}',${!c.na})">${c.na?"N/A ✓":"N/A"}</button>
      </div>`;
    }).join("");
    const gDone=g.items.filter(i=>{const c=checks[i.id]||{};return c.done;}).length;
    const gNa=g.items.filter(i=>{const c=checks[i.id]||{};return c.na;}).length;
    return`<div class="sec" style="margin-bottom:12px">
      <div class="sec-hdr" style="background:#f8f5f0">
        <span class="sec-title">${g.group}</span>
        <span style="font-size:10px;color:#8a7a50;font-weight:700">${gDone}/${g.items.length-gNa}${gNa?" · "+gNa+" N/A":""}</span>
      </div>
      ${rows}
    </div>`;
  }).join("");

  // Custom items section
  const customRows=custom.map(i=>{
    const c=checks[i.id]||{};
    return`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 16px;border-bottom:1px solid #f0ebe0;background:${c.na?"#faf8f5":c.done?"#f5faf5":"#fdf9f5"}">
      <input type="checkbox" style="width:14px;height:14px;accent-color:#8a7a50;cursor:pointer;flex-shrink:0;margin-top:2px" ${c.done?"checked":""} ${c.na?"disabled":""} onchange="setClCheck('${tx.id}','${checksKey}','${i.id}',this.checked)"/>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px">
          <input type="text" style="font-size:11px;color:${c.na?"#b0a890":c.done?"#8a9a80":"#3a3020"};text-decoration:${c.na||c.done?"line-through":"none"};background:transparent;border:none;border-bottom:1px dashed #c8b870;flex:1;font-family:'Lato',sans-serif;padding:1px 0" value="${esc(i.label)}" onchange="setClCustomLabel('${tx.id}','${customKey}','${i.id}',this.value)" onblur="setClCustomLabel('${tx.id}','${customKey}','${i.id}',this.value)"/>
          <span style="font-size:8px;background:#ede8de;color:#8a7a60;border-radius:3px;padding:1px 4px;font-weight:700;flex-shrink:0">custom</span>
        </div>
        <input type="text" style="background:transparent;border:none;border-bottom:1px solid #ece4d8;width:100%;font-family:'Lato',sans-serif;font-size:10px;color:#7a6a50;padding:2px 0;margin-top:3px" value="${esc((notes[i.id]?.note!==undefined?notes[i.id].note:notes[i.id])||"")}" placeholder="Notes…" onchange="setClNote('${tx.id}','${notesKey}','${i.id}',this.value)" onblur="setClNote('${tx.id}','${notesKey}','${i.id}',this.value)"/>
      </div>
      <button style="font-size:9px;color:${c.na?"#b08040":"#c0b8a8"};font-weight:700;cursor:pointer;padding:2px 7px;border:1px solid ${c.na?"#d4c080":"#e0d8c8"};border-radius:10px;background:${c.na?"#fff8e8":"transparent"};flex-shrink:0;white-space:nowrap" data-oc="setClNA('${tx.id}','${checksKey}','${i.id}',${!c.na})">${c.na?"N/A ✓":"N/A"}</button>
      <button style="background:none;border:none;color:#c0a898;cursor:pointer;font-size:14px;line-height:1;padding:0 2px;flex-shrink:0" data-oc="rmClCustom('${tx.id}','${customKey}','${checksKey}','${i.id}')">×</button>
    </div>`;
  }).join("");

  const customSection=`<div class="sec" style="margin-bottom:12px">
    <div class="sec-hdr" style="background:#f8f5f0">
      <span class="sec-title">Custom Items</span>
      <span style="font-size:10px;color:#8a7a50;font-weight:700">${custom.filter(i=>(checks[i.id]||{}).done).length}/${custom.filter(i=>!(checks[i.id]||{}).na).length}</span>
    </div>
    ${customRows}
    <div style="display:flex;gap:8px;align-items:center;padding:10px 16px;background:#f8f4ee;flex-wrap:wrap">
      <span style="font-size:10px;color:#8a7a60;font-weight:700;white-space:nowrap">+ ADD</span>
      <input id="cl-add-${tx.id}-${checksKey}" class="fi-sm" placeholder="New disclosure item…" style="flex:1;min-width:140px" onkeydown="if(event.key==='Enter')addClCustom('${tx.id}','${customKey}','${checksKey}')"/>
      <button data-oc="addClCustom('${tx.id}','${customKey}','${checksKey}')" style="background:#3a3020;color:#f5f0e8;border:none;border-radius:20px;padding:5px 14px;font-size:10px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer">Add</button>
    </div>
  </div>`;

  return`<div style="background:#faf7f2;border:1px solid #e0d8c8;border-radius:10px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
    <div style="flex:1;min-width:80px;background:#e8e0d0;border-radius:6px;height:6px"><div style="height:6px;border-radius:6px;background:linear-gradient(90deg,#8a7a50,#b0a060);width:${pct}%;transition:width .5s"></div></div>
    <span style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:#2a2010">${pct}%</span>
    <span style="font-size:10px;color:#8a7a60">${done} done · ${total-done} remaining${na?" · "+na+" N/A":""}</span>
