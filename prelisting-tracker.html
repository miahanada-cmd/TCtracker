<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pre-Listing Tracker — LRG</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#f5f0e8;color:#3a3020;font-family:'Lato','Helvetica Neue',sans-serif;font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:#f0ebe0}::-webkit-scrollbar-thumb{background:#d0c8b8;border-radius:2px}
input,textarea,select{outline:none;font-family:inherit}
input::placeholder,textarea::placeholder{color:#c0b8a8}
#app{display:flex;flex-direction:column;height:100vh}
/* TOPBAR */
#topbar{background:#faf7f2;border-bottom:1px solid #e0d8c8;padding:10px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;flex-wrap:wrap}
.brand{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:.5px;color:#2a2010}
.brand-sub{font-size:9px;color:#b0a890;letter-spacing:2.5px;font-weight:700;margin-left:10px}
.top-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#save-status{font-size:10px;letter-spacing:1px;color:#90a880}
.btn-primary{background:#3a3020;color:#f5f0e8;border:none;border-radius:20px;padding:6px 16px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer;letter-spacing:.5px}
.btn-primary:hover{opacity:.82}
.btn-ghost-sm{background:transparent;border:1px solid #d0c8b8;border-radius:20px;padding:5px 13px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer;color:#8a7a60;letter-spacing:.4px}
.btn-ghost-sm:hover{background:#ede8de}
/* LAYOUT */
#body{display:flex;flex:1;overflow:hidden}
#sidebar{width:200px;background:#f0ebe0;border-right:1px solid #e0d8c8;overflow-y:auto;flex-shrink:0}
#main-scroll{flex:1;overflow-y:auto}
#main{padding:20px 26px 60px}
/* SIDEBAR */
.tx-tab{padding:12px 14px;border-bottom:1px solid #e0d8c8;cursor:pointer;transition:background .14s;border-left:3px solid transparent}
.tx-tab:hover{background:#ede8de}
.tx-tab.active{background:#faf7f2;border-left-color:#8a7a50}
.t-addr{font-size:11px;color:#7a7060;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
.t-client{font-size:10px;color:#a09880;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb-out{background:#e0d8c8;border-radius:6px;height:4px;margin-top:6px}
.pb-in{height:4px;border-radius:6px;background:linear-gradient(90deg,#8a7a50,#b0a060);transition:width .4s}
.t-pct{font-size:9px;color:#b0a890;margin-top:2px}
/* SHARED */
.fi{background:#faf7f2;border:1px solid #d8d0c0;border-radius:7px;color:#3a3020;padding:7px 10px;font-family:'Lato',sans-serif;font-size:12px;transition:border-color .18s;width:100%}
.fi:focus{border-color:#a09060}
.fi-sm{background:#f5f0e8;border:1px solid #d8d0c0;border-radius:6px;color:#3a3020;padding:5px 8px;font-family:'Lato',sans-serif;font-size:11px}
.flabel{font-size:9px;color:#8a7a60;font-weight:700;letter-spacing:1.5px;display:block;margin-bottom:4px}
.sec{background:#faf7f2;border:1px solid #e0d8c8;border-radius:12px;margin-bottom:16px;overflow:hidden}
.sec-hdr{padding:11px 18px;border-bottom:1px solid #ece4d8;display:flex;align-items:center;justify-content:space-between;gap:10px}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;font-style:italic;color:#4a4030}
.sec-body{padding:14px 18px}
/* CHECKLIST ITEMS */
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:9px 16px;border-bottom:1px solid #f0ebe0;transition:background .12s}
.cl-item:last-child{border-bottom:none}
.cl-item:hover{background:#f8f5f0}
.cl-item.done-item{background:#f5faf5}
.cl-item.na-item{background:#faf8f5;opacity:.65}
.cl-cb{width:15px;height:15px;accent-color:#8a7a50;cursor:pointer;flex-shrink:0;margin-top:1px}
.cl-label{font-size:12px;color:#3a3020;cursor:pointer;flex:1;line-height:1.4}
.cl-label.checked{color:#8a9a80;text-decoration:line-through}
.cl-label.na{color:#b0a890;text-decoration:line-through}
.cl-note{font-size:10px;background:transparent;border:none;border-bottom:1px solid #ece4d8;width:100%;font-family:'Lato',sans-serif;color:#7a6a50;padding:2px 0;margin-top:3px}
.cl-note:focus{outline:none;border-bottom-color:#a09060}
.cl-date{font-size:10px;background:#f5f0e8;border:1px solid #e0d8c8;border-radius:5px;color:#5a5040;padding:2px 6px;font-family:'Lato',sans-serif;cursor:pointer;margin-left:4px}
.na-toggle{font-size:9px;color:#c0b8a8;font-weight:700;cursor:pointer;padding:2px 7px;border:1px solid #e0d8c8;border-radius:10px;white-space:nowrap;background:transparent;flex-shrink:0}
.na-toggle.active{color:#b08040;border-color:#d4c080;background:#fff8e8}
.add-item-bar{display:flex;gap:8px;align-items:center;padding:10px 16px;border-top:1px solid #ece4d8;background:#f8f4ee;flex-wrap:wrap}
/* PROGRESS */
.prog-wrap{background:#faf7f2;border:1px solid #e0d8c8;border-radius:10px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.prog-bar-out{flex:1;min-width:80px;background:#e8e0d0;border-radius:6px;height:6px}
.prog-bar-in{height:6px;border-radius:6px;background:linear-gradient(90deg,#8a7a50,#b0a060);transition:width .5s}
/* HEADER CARD */
.hdr-card{background:#faf7f2;border:1px solid #e0d8c8;border-radius:12px;padding:16px 18px;margin-bottom:16px}
/* DASHBOARD */
.dash-card{background:#faf7f2;border:1px solid #e0d8c8;border-radius:12px;padding:16px 20px;margin-bottom:14px;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.dash-card:hover{box-shadow:0 2px 12px rgba(58,48,32,.08);border-color:#c8b870}
.dash-card.done-card{background:#f5faf5;border-color:#b8d8b8;opacity:.85}
.dash-prog{background:#e8e0d0;border-radius:6px;height:5px;margin-top:8px}
.dash-prog-fill{height:5px;border-radius:6px;background:linear-gradient(90deg,#8a7a50,#b0a060);transition:width .4s}
/* OVERLAY / MODAL */
.overlay{position:fixed;inset:0;background:rgba(50,40,20,.42);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(5px)}
.modal{background:#faf7f2;border:1px solid #e0d8c8;border-radius:16px;padding:26px;width:420px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.13)}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#2a2010;margin-bottom:2px}
.modal-sub{font-size:9px;color:#b0a890;letter-spacing:2px;font-weight:700;margin-bottom:16px}
.field-wrap{margin-bottom:11px}
.field-wrap label{display:block;font-size:9px;color:#8a7a60;letter-spacing:1.5px;font-weight:700;margin-bottom:4px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.btn-create{flex:1;background:#3a3020;color:#f5f0e8;border:none;border-radius:20px;padding:10px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer}
.btn-cancel{flex:1;background:transparent;color:#8a7a60;border:1px solid #d0c8b8;border-radius:20px;padding:10px;font-size:11px;font-family:'Lato',sans-serif;cursor:pointer}
.empty-dash{display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;color:#c0b8a8;gap:12px}
.tab-btn{cursor:pointer;padding:6px 15px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;letter-spacing:.6px;border-radius:20px;transition:all .14s}
.tab-btn.active{background:#3a3020;color:#f5f0e8;border:1px solid #3a3020}
.tab-btn:not(.active){background:transparent;color:#8a7a60;border:1px solid #d0c8b8}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div>
        <span class="brand">Pre-Listing</span>
        <span class="brand-sub">LANDON REALTY GROUP</span>
      </div>
      <button id="dash-btn" class="btn-ghost-sm" onclick="goToDash()">⌂ Dashboard</button>
    </div>
    <div class="top-right">
      <span id="save-status">● saved</span>
      <span id="file-count"></span>
      <button class="btn-ghost-sm" onclick="exportData()" title="Download backup">⬇ Export</button>
      <label class="btn-ghost-sm" title="Restore from backup">⬆ Import<input type="file" accept=".json" onchange="importData(this)" style="display:none"/></label>
      <button class="btn-primary" onclick="openModal()">+ New Listing</button>
    </div>
  </div>
  <div id="body">
    <div id="sidebar"></div>
    <div id="main-scroll"><div id="main"></div></div>
  </div>
</div>

<div id="modal" class="overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>New Listing File</h2>
    <p class="modal-sub">FILL IN WHAT YOU KNOW — EDIT ANYTIME</p>
    <div class="field-wrap"><label>PROPERTY ADDRESS</label><input class="fi" id="m-address" placeholder="123 Main St, Burbank CA…"/></div>
    <div class="field-wrap"><label>SELLER NAME(S)</label><input class="fi" id="m-seller" placeholder="Seller name(s)…"/></div>
    <div class="field-wrap"><label>OUR AGENT</label>
      <select class="fi" id="m-agent">
        <option value="">Select agent…</option>
        <optgroup label="Team Agents">
          <option>Nancy Gonzalez</option><option>Ethan Plemmons</option><option>Heather Savoy</option>
          <option>Jason Chinchilla</option><option>Ki Contreras</option><option>Maya Worthy</option>
          <option>Luke Simon</option><option>Jennifer Landon</option>
        </optgroup>
        <optgroup label="Independent"><option>Casi Kneebone</option></optgroup>
        <optgroup label="Referral"><option>Artur Aleksanyan</option><option>Annie Mochrie</option></optgroup>
      </select>
    </div>
    <div class="field-wrap"><label>LIST PRICE</label><input class="fi" id="m-price" placeholder="$000,000"/></div>
    <div class="field-wrap"><label>TARGET LIST DATE</label><input class="fi" type="date" id="m-listdate"/></div>
    <div class="modal-btns">
      <button class="btn-create" onclick="createListing()">Create File</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

function progFile(f){
  let done=0,total=0;
  SECTIONS.forEach(s=>{
    const items=[...s.items,...((f.customItems||{})[s.id]||[])];
    items.forEach(i=>{
      const c=(f.checks||{})[i.id]||{};
      if(!c.na){total++;if(c.done)done++;}
    });
  });
  return total?Math.round(done/total*100):0;
}

            ${f.coListBrokerage?`<div><span style="font-size:9px;color:#a09880;font-weight:700;letter-spacing:1px;display:block;margin-bottom:1px">BROKERAGE</span>${esc(f.coListBrokerage)}${f.coListBrokerageDRE?" · DRE# "+esc(f.coListBrokerageDRE):""}</div>`:""}
            ${f.coListAssistant?`<div><span style="font-size:9px;color:#a09880;font-weight:700;letter-spacing:1px;display:block;margin-bottom:1px">ASSISTANT</span>${esc(f.coListAssistant)}${f.coListAssistantEmail?" · "+esc(f.coListAssistantEmail):""}</div>`:""}
          </div>
        </div>`:""}
      </div>`;
    })()}
    <div class="prog-wrap">
      <div class="prog-bar-out"><div class="prog-bar-in" style="width:${p}%"></div></div>
      <span style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:#2a2010">${p}%</span>
      <span style="font-size:10px;color:#8a7a60">pre-listing complete</span>
      <label style="display:flex;align-items:center;gap:7px;cursor:pointer;margin-left:auto;background:${f.listingDone?"#e8f4e8":"#f5f0e8"};border:1px solid ${f.listingDone?"#90c898":"#d0c8b8"};border-radius:20px;padding:5px 14px">
        <input type="checkbox" ${f.listingDone?"checked":""} onchange="setListingDone('${f.id}',this.checked)" style="accent-color:#3a7a4a;width:13px;height:13px;cursor:pointer"/>
        <span style="font-size:10px;font-weight:700;color:${f.listingDone?"#2a6a3a":"#8a7a60"}">${f.listingDone?"✓ Listing is Live":"Mark Listing Live"}</span>
      </label>
    </div>

    ${(()=>{
      // Urgent tasks for prelisting
      const urgent=[];
      // Items not done, not na, in key sections
      ['disclosures','tc_admin','title'].forEach(sid=>{
        const s=SECTIONS.find(x=>x.id===sid);if(!s)return;
        const items=[...s.items,...((f.customItems||{})[sid]||[])];
        items.forEach(i=>{
          const c=(f.checks||{})[i.id]||{};
          if(!c.done&&!c.na){
            urgent.push({label:i.label,section:s.title,bg:"#fff8e8",border:"#d4c080",dot:"#c4a840",text:"#7a5a00"});
          }
        });
      });
      // List date approaching
      if(f.listDate){
        const d=daysUntil(f.listDate);
        if(d!==null&&d<=7&&d>=0) urgent.push({label:"List Date Approaching",section:`${fmtShort(f.listDate)} — ${d===0?"TODAY":d===1?"tomorrow":d+"d away"}`,bg:"#f0e8f8",border:"#b090c8",dot:"#8a60a8",text:"#4a2a68"});
      }
      // RLA not signed
      if(!f.rlaSign) urgent.push({label:"RLA Not Signed",section:"Listing Documents",bg:"#f5e8e8",border:"#d49090",dot:"#c07070",text:"#8a3a3a"});
      // BM not open
      if(!f.bmFileOpen) urgent.push({label:"BM File Not Opened",section:"TC Admin",bg:"#fff8e8",border:"#d4c080",dot:"#c4a840",text:"#7a5a00"});
      // Drive not linked
      if(!f.driveFolder) urgent.push({label:"No Google Drive Folder",section:"File Setup",bg:"#f5f0e8",border:"#d0c8b8",dot:"#b0a890",text:"#8a7a60"});

      // Custom urgent items
      (f.customUrgent||[]).forEach(u=>{
        urgent.push({type:"custom",id:u.id,label:u.text,section:"Custom · added by you",bg:"#f0e8f8",border:"#b090c8",dot:"#8a60a8",text:"#4a2a68"});
      });

      const allClear=!urgent.length;

      const chips=urgent.map(u=>`<div style="background:${u.bg};border:1px solid ${u.border};border-radius:8px;padding:9px 13px;display:flex;align-items:flex-start;gap:9px">
        <div style="width:8px;height:8px;border-radius:50%;background:${u.dot};flex-shrink:0;margin-top:3px"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:11px;font-weight:700;color:${u.text}">${esc(u.label)}</div>
          <div style="font-size:10px;color:${u.text};opacity:.8;margin-top:1px">${esc(u.section)}</div>
        </div>
        ${u.type==="custom"?`<button onclick="rmPLUrgent('${f.id}','${u.id}')" style="background:none;border:none;color:#b090c8;cursor:pointer;font-size:14px;line-height:1;padding:0;flex-shrink:0">×</button>`:""}
      </div>`).join("");

      return`<div style="background:#faf7f2;border:1px solid #e0d8c8;border-radius:12px;padding:14px 16px;margin-bottom:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span style="font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;font-style:italic;color:#4a4030">Urgent Tasks</span>
          <span style="font-size:9px;color:#b0a890;font-weight:700;letter-spacing:1px">${urgent.length} item${urgent.length!==1?"s":""} need${urgent.length===1?"s":""} attention</span>
        </div>
        ${allClear?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><span style="font-size:16px">✓</span><span style="font-size:12px;color:#3a6644;font-weight:700">No urgent tasks — this listing is on track!</span></div>`:""}
        ${chips?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-bottom:10px">${chips}</div>`:""}
        <div style="display:flex;gap:8px;align-items:center;padding-top:8px;border-top:1px solid #ece4d8;flex-wrap:wrap">
          <span style="font-size:9px;color:#8a7a60;font-weight:700;white-space:nowrap">+ ADD URGENT ITEM</span>
          <input id="pl-cu-input-${f.id}" class="fi-sm" placeholder="Describe the urgent matter…" style="flex:1;min-width:160px" onkeydown="if(event.key==='Enter')addPLUrgent('${f.id}')"/>
          <button onclick="addPLUrgent('${f.id}')" style="background:#3a3020;color:#f5f0e8;border:none;border-radius:20px;padding:5px 14px;font-size:10px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap">Add</button>
        </div>
      </div>`;
    })()}

    <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
      <button class="tab-btn${FTAB==="checklist"?" active":""}" onclick="swFTab('checklist')">Pre-Listing Checklist</button>
      <button class="tab-btn${FTAB==="disclosures"?" active":""}" onclick="swFTab('disclosures')">Office Disclosures</button>
      <button onclick="sendAgentUpdate('${f.id}')" style="margin-left:auto;background:#3a3020;color:#f5f0e8;border:none;border-radius:20px;padding:6px 16px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer;letter-spacing:.5px;flex-shrink:0">✉ Agent Update</button>
    </div>
    ${FTAB==="disclosures"?rChecklistTab(f,DISC_ITEMS,'discChecks','discNotes'):allSections+`<div class="sec"><div class="sec-hdr"><span class="sec-title">General Notes</span></div><div class="sec-body"><textarea class="fi" rows="4" placeholder="General notes about this listing…" onchange="setField('${f.id}','notes',this.value)" onblur="setField('${f.id}','notes',this.value)" style="resize:vertical">${esc(f.notes||"")}</textarea></div></div>`}`;
}

/* ── UTILS ── */
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function fmtShort(d){if(!d)return"";return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function daysUntil(d){if(!d)return null;const t=new Date();t.setHours(0,0,0,0);return Math.round((new Date(d+"T00:00:00")-t)/86400000);}

function swFTab(t){FTAB=t;rMain();bindOnclicks(document.getElementById("main"));}
function addPLUrgent(fid){
  const f=FILES.find(x=>x.id===fid);if(!f)return;
  const el=document.getElementById("pl-cu-input-"+fid);
  const text=(el?.value||"").trim();if(!text){el?.focus();return;}
  if(!f.customUrgent)f.customUrgent=[];
  f.customUrgent.push({id:"plu_"+Date.now(),text});
  el.value="";rMain();save();
}
function rmPLUrgent(fid,uid){
  const f=FILES.find(x=>x.id===fid);if(!f)return;
  f.customUrgent=(f.customUrgent||[]).filter(u=>u.id!==uid);
  rMain();save();
}

function sendAgentUpdate(fid){
  const f=FILES.find(x=>x.id===fid);if(!f)return;
  const agInfo=AGENTS[f.agent]||{};
  const agEmail=f.agentEmail||agInfo.email||"";
  const agName=f.agent||"";
  const addr=f.address||"(address)";
  const firstName=agName?agName.split(" ")[0]:"";

  // Incomplete items by section
  const sectionSummary=SECTIONS.map(s=>{
    const items=[...s.items,...((f.customItems||{})[s.id]||[])];
    const pending=items.filter(i=>{const c=(f.checks||{})[i.id]||{};return!c.done&&!c.na;});
    const done=items.filter(i=>{const c=(f.checks||{})[i.id]||{};return c.done;});
    return{title:s.title,pending:pending.map(i=>i.label),done:done.length,total:items.length-items.filter(i=>(f.checks||{})[i.id]?.na).length};
  }).filter(s=>s.pending.length>0||s.done>0);

  const listDate=f.listDate?fmtShort(f.listDate):"TBD";
  const listDays=f.listDate?daysUntil(f.listDate):null;
  const listLine=listDays!==null?(listDays<0?`${Math.abs(listDays)} days past target date`:listDays===0?"TARGET DATE TODAY":`${listDays} days to target list date`):"";

  const lines=[];
  lines.push(firstName?`Hi ${firstName},`:"Hi,");
  lines.push("");
  lines.push(`Here's a pre-listing status update for ${addr}:`);
  if(listDate!=="TBD")lines.push(`Target List Date: ${listDate}${listLine?" — "+listLine:""}`);
  if(f.listPrice)lines.push(`List Price: ${f.listPrice}`);
  lines.push(`Progress: ${progFile(f)}% complete`);
  lines.push("");

  // Status flags
  const flags=[];
  if(f.rlaSign)flags.push("✓  RLA Signed");else flags.push("⚠  RLA — not yet signed");
  if(f.bmFileOpen)flags.push("✓  BM File Open");else flags.push("⚠  BM File — not yet opened");
  if(f.driveFolder)flags.push("✓  Drive Folder Set Up");else flags.push("⚠  Google Drive folder — not linked");
  if(flags.length){lines.push("STATUS");lines.push("─────────────────────────────");flags.forEach(l=>lines.push(l));lines.push("");}

  // Sections with pending items = needs attention
  const needsAttn=sectionSummary.filter(s=>s.pending.length&&s.done<s.total);
  if(needsAttn.length){
    lines.push("PENDING ITEMS");
    lines.push("─────────────────────────────");
    needsAttn.forEach(s=>{
      lines.push(`${s.title} (${s.done}/${s.total} done):`);
      s.pending.slice(0,5).forEach(l=>lines.push(`  →  ${l}`));
      if(s.pending.length>5)lines.push(`  →  …and ${s.pending.length-5} more`);
    });
    lines.push("");
  }

  // Completed sections
  const completed=sectionSummary.filter(s=>s.pending.length===0&&s.done>0);
  if(completed.length){
    lines.push("COMPLETED");
    lines.push("─────────────────────────────");
    completed.forEach(s=>lines.push(`✓  ${s.title}`));
    lines.push("");
  }

  lines.push("[Add any notes or action items here]");
  lines.push("");
  lines.push("Please let me know if you need anything.");
  lines.push("");
  lines.push("Best,");
  lines.push(LRG.tcName);
  lines.push("TC | Landon Realty Group");
  lines.push(LRG.tcEmail);

  const subject=`Pre-Listing Update — ${addr}${listDate!=="TBD"?" | List "+listDate:""}`;
  const body=lines.join("\n");
  openEmailModal(agEmail,subject,body);
}

function rChecklistTab(f,itemGroups,checksKey,notesKey){
  const checks=f[checksKey]||{};
  const notes=f[notesKey]||{};
  const labelsKey=checksKey+'Labels';
  const customKey=checksKey+'Custom';
  const labels=f[labelsKey]||{};
  const custom=f[customKey]||[];
  let total=0,done=0,na=0;
  itemGroups.forEach(g=>g.items.forEach(i=>{const c=checks[i.id]||{};if(c.na)na++;else{total++;if(c.done)done++;}}));
  custom.forEach(i=>{const c=checks[i.id]||{};if(c.na)na++;else{total++;if(c.done)done++;}});
  const pct=total?Math.round(done/total*100):0;
  const sections=itemGroups.map(g=>{
    const rows=g.items.map(i=>{
      const c=checks[i.id]||{};
      const lbl=labels[i.id]||i.label;
      return`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 16px;border-bottom:1px solid #f0ebe0;background:${c.na?"#faf8f5":c.done?"#f5faf5":"#faf7f2"}">
        <input type="checkbox" style="width:14px;height:14px;accent-color:#8a7a50;cursor:pointer;flex-shrink:0;margin-top:2px" ${c.done?"checked":""} ${c.na?"disabled":""} onchange="setClCheck('${f.id}','${checksKey}','${i.id}',this.checked)"/>
        <div style="flex:1;min-width:0">
          <input type="text" style="font-size:11px;color:${c.na?"#b0a890":c.done?"#8a9a80":"#3a3020"};text-decoration:${c.na||c.done?"line-through":"none"};background:transparent;border:none;border-bottom:1px dashed ${labels[i.id]?"#c8b870":"transparent"};width:100%;font-family:'Lato',sans-serif;padding:1px 0;line-height:1.4" value="${esc(lbl)}" title="Click to edit label" onchange="setClLabel('${f.id}','${labelsKey}','${i.id}',this.value)" onblur="setClLabel('${f.id}','${labelsKey}','${i.id}',this.value)"/>
          ${labels[i.id]?`<div style="font-size:8px;color:#b08840;margin-top:1px">✎ edited · <button onclick="setClLabel('${f.id}','${labelsKey}','${i.id}','')" style="background:#fff3e0;border:1px solid #d4a840;border-radius:8px;color:#8a5a00;cursor:pointer;font-size:8px;padding:2px 7px;font-family:'Lato',sans-serif;font-weight:700">↩ restore original</button></div>`:""}
          ${c.done&&c.date?`<div style="font-size:9px;color:#3a6644;font-weight:700;margin-top:1px">✓ ${fmtShort(c.date)}</div>`:""}
          <input type="text" style="background:transparent;border:none;border-bottom:1px solid #ece4d8;width:100%;font-family:'Lato',sans-serif;font-size:10px;color:#7a6a50;padding:2px 0;margin-top:3px" value="${esc(notes[i.id]||"")}" placeholder="Notes…" onchange="setClNote('${f.id}','${notesKey}','${i.id}',this.value)" onblur="setClNote('${f.id}','${notesKey}','${i.id}',this.value)"/>
        </div>
        <button style="font-size:9px;color:${c.na?"#b08040":"#c0b8a8"};font-weight:700;cursor:pointer;padding:2px 7px;border:1px solid ${c.na?"#d4c080":"#e0d8c8"};border-radius:10px;background:${c.na?"#fff8e8":"transparent"};flex-shrink:0;white-space:nowrap" onclick="setClNA('${f.id}','${checksKey}','${i.id}',${!c.na})">${c.na?"N/A ✓":"N/A"}</button>
      </div>`;
    }).join("");
    const gDone=g.items.filter(i=>{const c=checks[i.id]||{};return c.done;}).length;
    const gNa=g.items.filter(i=>{const c=checks[i.id]||{};return c.na;}).length;
    return`<div class="sec" style="margin-bottom:12px">
      <div class="sec-hdr" style="background:#f8f5f0"><span class="sec-title">${g.group}</span><span style="font-size:10px;color:#8a7a50;font-weight:700">${gDone}/${g.items.length-gNa}${gNa?" · "+gNa+" N/A":""}</span></div>
      ${rows}
    </div>`;
  }).join("");
  const customRows=custom.map(i=>{
    const c=checks[i.id]||{};
    return`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 16px;border-bottom:1px solid #f0ebe0;background:${c.na?"#faf8f5":c.done?"#f5faf5":"#fdf9f5"}">
      <input type="checkbox" style="width:14px;height:14px;accent-color:#8a7a50;cursor:pointer;flex-shrink:0;margin-top:2px" ${c.done?"checked":""} ${c.na?"disabled":""} onchange="setClCheck('${f.id}','${checksKey}','${i.id}',this.checked)"/>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px">
          <input type="text" style="font-size:11px;color:${c.na?"#b0a890":c.done?"#8a9a80":"#3a3020"};text-decoration:${c.na||c.done?"line-through":"none"};background:transparent;border:none;border-bottom:1px dashed #c8b870;flex:1;font-family:'Lato',sans-serif;padding:1px 0" value="${esc(i.label)}" onchange="setClCustomLabel('${f.id}','${customKey}','${i.id}',this.value)" onblur="setClCustomLabel('${f.id}','${customKey}','${i.id}',this.value)"/>
          <span style="font-size:8px;background:#ede8de;color:#8a7a60;border-radius:3px;padding:1px 4px;font-weight:700;flex-shrink:0">custom</span>
        </div>
        <input type="text" style="background:transparent;border:none;border-bottom:1px solid #ece4d8;width:100%;font-family:'Lato',sans-serif;font-size:10px;color:#7a6a50;padding:2px 0;margin-top:3px" value="${esc(notes[i.id]||"")}" placeholder="Notes…" onchange="setClNote('${f.id}','${notesKey}','${i.id}',this.value)" onblur="setClNote('${f.id}','${notesKey}','${i.id}',this.value)"/>
      </div>
      <button style="font-size:9px;color:${c.na?"#b08040":"#c0b8a8"};font-weight:700;cursor:pointer;padding:2px 7px;border:1px solid ${c.na?"#d4c080":"#e0d8c8"};border-radius:10px;background:${c.na?"#fff8e8":"transparent"};flex-shrink:0;white-space:nowrap" onclick="setClNA('${f.id}','${checksKey}','${i.id}',${!c.na})">${c.na?"N/A ✓":"N/A"}</button>
      <button style="background:none;border:none;color:#c0a898;cursor:pointer;font-size:14px;line-height:1;padding:0 2px;flex-shrink:0" onclick="rmClCustom('${f.id}','${customKey}','${checksKey}','${i.id}')">×</button>
    </div>`;
  }).join("");
  return`<div style="background:#faf7f2;border:1px solid #e0d8c8;border-radius:10px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
    <div style="flex:1;min-width:80px;background:#e8e0d0;border-radius:6px;height:6px"><div style="height:6px;border-radius:6px;background:linear-gradient(90deg,#8a7a50,#b0a060);width:${pct}%;transition:width .5s"></div></div>
    <span style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:#2a2010">${pct}%</span>
    <span style="font-size:10px;color:#8a7a60">${done} done · ${total-done} remaining${na?" · "+na+" N/A":""}</span>
    <span style="font-size:9px;color:#b0a890;margin-left:4px">· click any label to edit</span>
  </div>${sections}
  <div class="sec" style="margin-bottom:12px">
    <div class="sec-hdr" style="background:#f8f5f0"><span class="sec-title">Custom Items</span><span style="font-size:10px;color:#8a7a50;font-weight:700">${custom.filter(i=>(checks[i.id]||{}).done).length}/${custom.filter(i=>!(checks[i.id]||{}).na).length}</span></div>
    ${customRows}
    <div style="display:flex;gap:8px;align-items:center;padding:10px 16px;background:#f8f4ee;flex-wrap:wrap">
      <span style="font-size:10px;color:#8a7a60;font-weight:700;white-space:nowrap">+ ADD</span>
      <input id="cl-add-${f.id}-${checksKey}" class="fi-sm" placeholder="New disclosure item…" style="flex:1;min-width:140px" onkeydown="if(event.key==='Enter')addClCustom('${f.id}','${customKey}','${checksKey}')"/>
      <button onclick="addClCustom('${f.id}','${customKey}','${checksKey}')" style="background:#3a3020;color:#f5f0e8;border:none;border-radius:20px;padding:5px 14px;font-size:10px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer">Add</button>
    </div>
  </div>`;
}

function setClCheck(fid,key,iid,val){
  const f=FILES.find(x=>x.id===fid);if(!f)return;
  if(!f[key])f[key]={};
  f[key][iid]={...f[key][iid],done:val,date:val?new Date().toISOString().slice(0,10):""};
  rMain();save();
}
function setClNote(fid,key,iid,v){const f=FILES.find(x=>x.id===fid);if(!f)return;if(!f[key])f[key]={};if(!f[key][iid])f[key][iid]={};f[key][iid].note=v;save();}
function setClNA(fid,key,iid,val){
  const f=FILES.find(x=>x.id===fid);if(!f)return;
  if(!f[key])f[key]={};if(!f[key][iid])f[key][iid]={};
  f[key][iid].na=val;if(val)f[key][iid].done=false;
  rMain();save();
}
function setClLabel(fid,labelsKey,iid,v){
  const f=FILES.find(x=>x.id===fid);if(!f)return;
  if(!f[labelsKey])f[labelsKey]={};
  if(v)f[labelsKey][iid]=v;else delete f[labelsKey][iid];
  rMain();save();
}
function setClCustomLabel(fid,customKey,iid,v){
  const f=FILES.find(x=>x.id===fid);if(!f)return;
  const item=(f[customKey]||[]).find(i=>i.id===iid);
  if(item)item.label=v;save();
}
function addClCustom(fid,customKey,checksKey){
  const f=FILES.find(x=>x.id===fid);if(!f)return;
  const el=document.getElementById("cl-add-"+fid+"-"+checksKey);
  const lbl=(el?.value||"").trim();if(!lbl){el?.focus();return;}
  if(!f[customKey])f[customKey]=[];
  const id="clc_"+Date.now();
  f[customKey].push({id,label:lbl});
  if(el)el.value="";
  rMain();save();
}
function rmClCustom(fid,customKey,checksKey,iid){
  const f=FILES.find(x=>x.id===fid);if(!f)return;
  f[customKey]=(f[customKey]||[]).filter(i=>i.id!==iid);
  if(f[checksKey])delete f[checksKey][iid];
  rMain();save();
}

/* ── ACTIONS ── */

function goToDash(){VIEW="dash";render();save();}
function setField(fid,k,v){const f=FILES.find(x=>x.id===fid);if(f){f[k]=v;rSidebar();save();}}
function setAgentFromSelect(fid,val){
  const f=FILES.find(x=>x.id===fid);if(!f)return;
  if(AGENTS[val]){f.agent=val;f.agentDRE=AGENTS[val].dre;f.agentEmail=AGENTS[val].email;f.agentPhone=AGENTS[val].phone;}
  else{f.agent=val;f.agentDRE="";f.agentEmail="";f.agentPhone="";}
  rMain();save();
}
function setToggle(fid,k,val){const f=FILES.find(x=>x.id===fid);if(f){f[k]=val;rMain();save();}}
function setPLComm(fid,field,key,v){const f=FILES.find(x=>x.id===fid);if(!f)return;if(!f[field])f[field]={};f[field][key]=v;if(key==="type")rMain();else save();}
function setCheck(fid,iid,val){
  const f=FILES.find(x=>x.id===fid);if(!f)return;
  if(!f.checks[iid])f.checks[iid]={};
  f.checks[iid].done=val;
  f.checks[iid].date=val?new Date().toISOString().slice(0,10):"";
  rMain();save();
}
function setNote(fid,iid,v){const f=FILES.find(x=>x.id===fid);if(!f)return;if(!f.checks[iid])f.checks[iid]={};f.checks[iid].note=v;save();}
function setNA(fid,iid,val){const f=FILES.find(x=>x.id===fid);if(!f)return;if(!f.checks[iid])f.checks[iid]={};f.checks[iid].na=val;if(val)f.checks[iid].done=false;rMain();save();}
function setSigningStatus(fid,iid,key,val){
  const f=FILES.find(x=>x.id===fid);if(!f)return;
  if(!f.checks[iid])f.checks[iid]={};
  f.checks[iid][key]=val;
  // Auto-check done when both seller signed and uploaded
  if(val&&f.checks[iid].sellerSigned&&f.checks[iid].uploadedToDrive){
    f.checks[iid].done=true;f.checks[iid].date=new Date().toISOString().slice(0,10);
  }
  rMain();save();
}
function setListingDone(fid,val){const f=FILES.find(x=>x.id===fid);if(f){f.listingDone=val;rMain();save();}}
function setDashNote(fid,v){const f=FILES.find(x=>x.id===fid);if(f){f.dashNote=v;save();}}
function addCustomItem(fid,sid){
  const f=FILES.find(x=>x.id===fid);if(!f)return;
  const el=document.getElementById("ci-"+sid+"-"+fid);
  const label=(el?.value||"").trim();if(!label){el?.focus();return;}
  if(!f.customItems)f.customItems={};
  if(!f.customItems[sid])f.customItems[sid]=[];
  const id="ci_"+Date.now();
  f.customItems[sid].push({id,label});
  f.checks[id]={done:false,na:false,date:"",note:""};
  el.value="";
  rMain();save();
}
function rmCustomItem(fid,sid,iid){
  const f=FILES.find(x=>x.id===fid);if(!f)return;
  if(f.customItems&&f.customItems[sid])f.customItems[sid]=f.customItems[sid].filter(i=>i.id!==iid);
  rMain();save();
}
function rmFile(fid){
  if(!confirm("Remove this listing file?"))return;
  FILES=FILES.filter(f=>f.id!==fid);
  if(AID===fid)AID=FILES[0]?.id||null;
  VIEW="dash";render();save();
}

/* ── MODAL ── */
function openModal(){document.getElementById("modal").style.display="flex";}
function closeModal(){document.getElementById("modal").style.display="none";}
function createListing(){
  const addr=document.getElementById("m-address").value.trim();
  if(!addr){document.getElementById("m-address").focus();return;}
  const agentVal=document.getElementById("m-agent").value;
  const f=nFile();
  f.address=addr;
  f.seller=document.getElementById("m-seller").value;
  f.listPrice=document.getElementById("m-price").value;
  f.listDate=document.getElementById("m-listdate").value;
  if(agentVal&&AGENTS[agentVal]){
    f.agent=agentVal;f.agentDRE=AGENTS[agentVal].dre;f.agentEmail=AGENTS[agentVal].email;f.agentPhone=AGENTS[agentVal].phone;
  }else{f.agent=agentVal;}
  FILES.push(f);AID=f.id;VIEW="file";
  closeModal();render();save();
}

/* ── EVENT DELEGATION (Chrome file:// fix) ── */
function bindOnclicks(root){
  if(!root)return;
  root.querySelectorAll('[onclick]').forEach(el=>{
    const fn=el.getAttribute('onclick');if(!fn)return;
    el.removeAttribute('onclick');
    el.addEventListener('click',function(e){try{(new Function('event',fn)).call(this,e);}catch(err){console.error(err);}});
  });
}
