function sendAgentUpdate(tid){
  const tx=TXS.find(t=>t.id===tid);if(!tx)return;
  const agInfo=LRG.agents[tx.agent]||{};
  const agEmail=tx.agentEmail||agInfo.email||"";
  const agName=tx.agent||"";
  const addr=tx.address||"(address)";
  const client=tx.client||"";
  const coe=tx.coeDate?fmtShort(tx.coeDate):"TBD";
  const coeDays=tx.coeDate?daysUntil(tx.coeDate):null;
  const coeLine=coeDays!==null?(coeDays<0?`${Math.abs(coeDays)} days past COE — please advise`:coeDays===0?"COE is TODAY":coeDays<=7?`${coeDays} days to COE`:`${coeDays} days to COE`):"";
  const prog=progTx(tx);
  const rep=tx.represent==="buyer"?"Buyer":"Seller";
  const firstName=agName?agName.split(" ")[0]:"";

  // ── WHAT'S DONE ──
  const doneMilestones=allMS(tx).filter(m=>{
    const ms=tx.milestones[m.id];
    return ms&&ms.status==="done";
  }).map(m=>m.label);

  // Done contingencies
  const doneConts=[];
  if(tx.acceptDate){
    RPA_PERIODS.filter(p=>p.type==="contingency").forEach(p=>{
      if((tx.waivedPeriods||{})[p.id])doneConts.push(p.name+" (waived)");
      else if((tx.periodDone||{})[p.id]?.done)doneConts.push(p.name+" — removed");
    });
  }

  // ── IN PROGRESS ──
  const inProgress=allMS(tx).filter(m=>{
    const ms=tx.milestones[m.id];
    return ms&&ms.status==="in_progress";
  }).map(m=>m.label);

  // ── NEEDS THEIR ATTENTION ──
  // Contingencies expiring soon
  const urgentConts=[];
  if(tx.acceptDate){
    const acceptDt=new Date(tx.acceptDate+"T00:00:00");
    RPA_PERIODS.filter(p=>p.type==="contingency"||p.id==="buyer_disclosures_review").forEach(p=>{
      if((tx.waivedPeriods||{})[p.id])return;
      if((tx.periodDone||{})[p.id]?.done)return;
      const overrideDate=(tx.periodDates||{})[p.id];
      const overrideStart=(tx.periodStarts||{})[p.id];
      let endD;
      if(overrideDate){endD=new Date(overrideDate+"T00:00:00");}
      else{
        let startD=new Date(acceptDt);
        if(overrideStart)startD=new Date(overrideStart+"T00:00:00");
        endD=new Date(startD);endD.setDate(endD.getDate()+(tx.periods[p.id]??p.defaultDays));
      }
      const d=daysUntil(toYMD(endD));
      if(d!==null&&d<=14&&d>=0){
        const urgTag=d===0?" — EXPIRES TODAY":d===1?" — expires tomorrow":` — expires ${fmtShort(toYMD(endD))} (${d} days)`;
        urgentConts.push(p.name+urgTag);
      } else if(d!==null&&d<0){
        urgentConts.push(p.name+` — EXPIRED ${fmtShort(toYMD(endD))} — action needed`);
      }
    });
  }

  // Blocked milestones
  const blocked=allMS(tx).filter(m=>{
    const ms=tx.milestones[m.id];
    return ms&&ms.status==="blocked";
  }).map(m=>{
    const ms=tx.milestones[m.id];
    return m.label+(ms.notes?` — ${ms.notes}`:"");
  });

  // Open RR
  const openRR=(tx.rrList||[]).filter(r=>r.status!=="Accepted"&&r.status!=="Completed"&&r.status!=="Withdrawn");

  // Pending CR
  const pendingCR=(tx.crList||[]).filter(r=>r.status==="Pending"||r.status==="Sent");

  // ── NEXT STEPS ──
  // Pending milestones due soonest
  const nextSteps=allMS(tx).filter(m=>{
    const ms=tx.milestones[m.id];
    return ms&&ms.status==="pending"&&ms.dueDate;
  }).sort((a,b)=>{
    const da=daysUntil(tx.milestones[a.id].dueDate)||999;
    const db=daysUntil(tx.milestones[b.id].dueDate)||999;
    return da-db;
  }).slice(0,5).map(m=>{
    const ms=tx.milestones[m.id];
    const d=daysUntil(ms.dueDate);
    return m.label+(ms.dueDate?` — ${fmtShort(ms.dueDate)}${d===0?" (TODAY)":d===1?" (tomorrow)":d!==null?" ("+d+" days)":""}`:"")+
      (ms.notes?`\n     Note: ${ms.notes}`:"");
  });

  // ── BUILD EMAIL ──
  const lines=[];
  lines.push(firstName?`Hi ${firstName},`:"Hi,");
  lines.push("");
  lines.push(`Here's your transaction update for ${addr}${client?` (${client})`:""}:`);
  lines.push(`COE: ${coe}${coeLine?" — "+coeLine:""}`);
  lines.push(`Overall Progress: ${prog}%`);

  // What's been completed
  const completedItems=[...doneConts,...doneMilestones.slice(0,6)];
  if(completedItems.length){
    lines.push("");
    lines.push("COMPLETED");
    lines.push("─────────────────────────────");
    completedItems.forEach(l=>lines.push(`✓  ${l}`));
  }

  // In progress
  if(inProgress.length){
    lines.push("");
    lines.push("IN PROGRESS");
    lines.push("─────────────────────────────");
    inProgress.forEach(l=>lines.push(`⟳  ${l}`));
  }

  // Needs attention
  const attentionItems=[
    ...urgentConts.map(l=>`⚠  ${l}`),
    ...blocked.map(l=>`🔴 BLOCKED: ${l}`),
    ...openRR.map(r=>`🔧 RR ${r.rrType||""}${r.item?" — "+r.item:""}${r.amount?" ($"+r.amount+")":""}${r.status?" — "+r.status:""}`),
    ...pendingCR.map(r=>`📄 CR Pending: ${r.contingency||"contingency"}${r.date?" — sent "+fmtShort(r.date):""}`)
  ];
  if(attentionItems.length){
    lines.push("");
    lines.push("NEEDS ATTENTION");
    lines.push("─────────────────────────────");
    attentionItems.forEach(l=>lines.push(l));
  }

  // Next steps
  if(nextSteps.length){
    lines.push("");
    lines.push("NEXT STEPS");
    lines.push("─────────────────────────────");
    nextSteps.forEach(l=>lines.push(`→  ${l}`));
  }

  lines.push("");
  lines.push("[Add any notes or questions here]");
  lines.push("");
  lines.push("Please let me know if you need anything.");
  lines.push("");
  lines.push("Best,");
  lines.push(LRG.tcName);
  lines.push(`TC | Landon Realty Group`);
  lines.push(LRG.tcEmail);

  const subject=`Transaction Update — ${addr}${coe!=="TBD"?" | COE "+coe:""}`;
  const body=lines.join("\n");

  // Open modal with editable preview
  const modal=document.createElement("div");
  modal.style.cssText="position:fixed;inset:0;background:rgba(50,40,20,.5);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(6px)";
  modal.innerHTML=`<div style="background:#faf7f2;border:1px solid #e0d8c8;border-radius:16px;padding:24px;width:600px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;gap:14px;box-shadow:0 8px 40px rgba(0,0,0,.15)">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:#2a2010">Agent Update Email</span>
      <button id="au-close" style="background:none;border:none;color:#a09880;font-size:20px;cursor:pointer;line-height:1">×</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div>
        <label style="font-size:9px;color:#8a7a60;font-weight:700;letter-spacing:1.5px;display:block;margin-bottom:3px">TO</label>
        <input id="au-to" value="${esc(agEmail)}" placeholder="Agent email…" style="width:100%;background:#f5f0e8;border:1px solid #d8d0c0;border-radius:7px;padding:7px 10px;font-family:'Lato',sans-serif;font-size:12px;color:#3a3020"/>
      </div>
      <div>
        <label style="font-size:9px;color:#8a7a60;font-weight:700;letter-spacing:1.5px;display:block;margin-bottom:3px">SUBJECT</label>
        <input id="au-subject" value="${esc(subject)}" style="width:100%;background:#f5f0e8;border:1px solid #d8d0c0;border-radius:7px;padding:7px 10px;font-family:'Lato',sans-serif;font-size:12px;color:#3a3020"/>
      </div>
      <div>
        <label style="font-size:9px;color:#8a7a60;font-weight:700;letter-spacing:1.5px;display:block;margin-bottom:3px">MESSAGE — EDIT BEFORE SENDING</label>
        <textarea id="au-body" style="width:100%;min-height:260px;background:#f5f0e8;border:1px solid #d8d0c0;border-radius:7px;padding:10px 12px;font-family:'Lato',sans-serif;font-size:11px;color:#3a3020;line-height:1.6;resize:vertical">${esc(body)}</textarea>
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button id="au-mailto" style="flex:1;background:#3a3020;color:#f5f0e8;border:none;border-radius:20px;padding:10px 20px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer">✉ Open in Email App</button>
      <button id="au-copy" style="flex:1;background:transparent;color:#8a7a60;border:1px solid #d0c8b8;border-radius:20px;padding:10px 20px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer">📋 Copy to Clipboard</button>
      <button id="au-close2" style="background:transparent;color:#a09880;border:1px solid #d0c8b8;border-radius:20px;padding:10px 16px;font-size:11px;font-family:'Lato',sans-serif;cursor:pointer">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(modal);

  const close=()=>document.body.removeChild(modal);
  modal.querySelector("#au-close").addEventListener("click",close);
  modal.querySelector("#au-close2").addEventListener("click",close);
  modal.addEventListener("click",e=>{if(e.target===modal)close();});

  modal.querySelector("#au-mailto").addEventListener("click",()=>{
    const to=encodeURIComponent(modal.querySelector("#au-to").value.trim());
    const subj=encodeURIComponent(modal.querySelector("#au-subject").value);
    const bd=encodeURIComponent(modal.querySelector("#au-body").value);
    window.location.href=`mailto:${to}?subject=${subj}&body=${bd}`;
  });

  modal.querySelector("#au-copy").addEventListener("click",()=>{
    const full=`To: ${modal.querySelector("#au-to").value}\nSubject: ${modal.querySelector("#au-subject").value}\n\n${modal.querySelector("#au-body").value}`;
    navigator.clipboard.writeText(full).then(()=>{
      const btn=modal.querySelector("#au-copy");
      btn.textContent="✓ Copied!";btn.style.background="#e8f4e8";btn.style.borderColor="#90c898";btn.style.color="#2a6a3a";
      setTimeout(()=>{btn.textContent="📋 Copy to Clipboard";btn.style.background="";btn.style.borderColor="";btn.style.color="";},2000);
    }).catch(()=>{
      // Fallback for browsers that block clipboard
      modal.querySelector("#au-body").select();document.execCommand("copy");
    });
  });
}

/* ── CHROME file:// FIX ──
   Chrome blocks onclick attributes injected via innerHTML when opened from file://.
   Solution: define bindOnclicks first, patch render/rMain/rSidebar BEFORE they run,
   then call load() and render() last so bindings are already in place. */
// ── GLOBAL CLICK DISPATCHER ──
// data-oc stores raw JS expression (single-quoted args, HTML-entity-encoded)
// data-action="open" data-id="..." for navigation
document.addEventListener('click', function(e){
  let el = e.target;
  for(let i=0; i<10 && el && el.tagName; i++){
    // data-action for file navigation
    if(el.dataset && el.dataset.action === 'open' && el.dataset.id){
      openFile(el.dataset.id); return;
    }
    // data-oc: raw JS expression stored in attribute
    if(el.hasAttribute && el.hasAttribute('data-oc')){
      // getAttribute gives us the HTML-decoded string (browser handles &quot; -> " automatically)
      const expr = el.getAttribute('data-oc');
      if(expr && expr !== 'null'){
        const s = document.createElement('script');
        s.textContent = 'try{' + expr + '}catch(_e){console.error("oc err:",' + JSON.stringify(expr) + ',_e)}';
        document.head.appendChild(s);
        document.head.removeChild(s);
      }
      return;
    }
    if('INPUT TEXTAREA SELECT'.includes(el.tagName)) return;
    el = el.parentElement;
  }
});

  try{await fetch(SB_URL+"/rest/v1/tracker_data",{method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},body:JSON.stringify({key:k,value:v,updated_at:new Date().toISOString()})});}catch(e){}
}
const _origSave=save;
save=function(){_origSave();const d=localStorage.getItem(SB_SK);if(d)sbSet(SB_SK,d);};
(async function(){
  try{const remote=await sbGet(SB_SK);if(remote)localStorage.setItem(SB_SK,remote);}catch(e){}
  load();render();
})();

</script>
