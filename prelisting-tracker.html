<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pre-Listing Tracker — LRG</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#f5f0e8;color:#3a3020;font-family:'Lato',sans-serif;font-size:13px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#f0ebe0}::-webkit-scrollbar-thumb{background:#c8b898;border-radius:2px}
input,textarea,select{outline:none;font-family:inherit}
input::placeholder,textarea::placeholder{color:#c0b8a8}
#app{display:flex;flex-direction:column;height:100vh}
#topbar{background:#3a3020;color:#f5f0e8;padding:8px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
.brand{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600}
.brand-sub{font-size:9px;color:#b0a890;letter-spacing:2px;font-weight:700}
#topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#save-status{font-size:9px;color:#90a880}
#file-count{font-size:10px;color:#b0a890}
.btn-top{background:transparent;border:1px solid #706050;color:#d0c8b8;border-radius:20px;padding:4px 12px;font-size:10px;cursor:pointer;white-space:nowrap}
.btn-top:hover{background:#4a3f2f}
.btn-primary{background:#8a7a50;color:#f5f0e8;border:none;border-radius:20px;padding:5px 14px;font-size:10px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer}
#body{display:flex;flex:1;overflow:hidden}
#sidebar{width:170px;background:#faf7f2;border-right:1px solid #e0d8c8;overflow-y:auto;flex-shrink:0}
#main-scroll{flex:1;overflow-y:auto}
#main{padding:18px;max-width:960px;margin:0 auto}
.pl-tab{padding:11px 13px;border-bottom:1px solid #e8e0d0;cursor:pointer;transition:background .14s;border-left:3px solid transparent}
.pl-tab:hover{background:#ede8de}.pl-tab.active{background:#faf7f2;border-left-color:#8a7a50}
.t-addr{font-size:11px;color:#7a7060;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-tab.active .t-addr{color:#2a2010;font-weight:700}
.t-sel{font-size:10px;color:#a09880;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-pct{font-size:9px;color:#b0a890;margin-top:2px}
.pb-out{height:3px;background:#e8e0d0;border-radius:2px;margin-top:3px}
.pb-in{height:3px;background:#8a7a50;border-radius:2px}
.dash-card{background:#fff;border:1px solid #e0d8c8;border-radius:12px;padding:16px;margin-bottom:12px}
.dash-card:hover{box-shadow:0 2px 12px #d0c8b820}
.sec{border:1px solid #e0d8c8;border-radius:10px;overflow:hidden;margin-bottom:14px}
.sec-hdr{background:#f5f0e8;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e0d8c8}
.sec-ttl{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;font-style:italic;color:#4a4030}
.sec-body{padding:14px 16px}
.tab-bar{display:flex;border-bottom:1px solid #e0d8c8;margin-bottom:16px;overflow-x:auto;flex-shrink:0}
.tab-btn{padding:8px 16px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;border:none;background:transparent;cursor:pointer;color:#8a7a60;border-bottom:2px solid transparent;white-space:nowrap}
.tab-btn.active{color:#3a3020;border-bottom-color:#8a7a50}
.fi{width:100%;background:#f5f0e8;border:1px solid #e0d8c8;border-radius:7px;padding:7px 10px;font-family:'Lato',sans-serif;font-size:12px;color:#3a3020}
.fi:focus{border-color:#8a7a50}
.fi-sm{background:#f5f0e8;border:1px solid #e0d8c8;border-radius:7px;padding:5px 8px;font-family:'Lato',sans-serif;font-size:11px;color:#3a3020}
.frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.flabel{font-size:9px;color:#a09880;font-weight:700;letter-spacing:1px;display:block;margin-bottom:3px}
.cl-row{display:flex;align-items:flex-start;gap:10px;padding:8px 16px;border-bottom:1px solid #f0ebe0;background:#faf7f2}
.cl-row:last-child{border-bottom:none}
.lbl{font-size:9px;color:#a09880;font-weight:700;letter-spacing:1px;display:block;margin-bottom:1px}
.osg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.osf{font-size:11px;color:#3a3020}
.overlay{position:fixed;inset:0;background:#0004;display:flex;align-items:center;justify-content:center;z-index:50}
.modal-box{background:#faf7f2;border:1px solid #d0c8b8;border-radius:14px;padding:24px;width:420px;max-width:95vw}
.modal-box h3{font-family:'Cormorant Garamond',serif;font-size:18px;margin-bottom:16px;color:#3a3020}
.fw{margin-bottom:10px}.fw label{font-size:9px;color:#a09880;font-weight:700;letter-spacing:1px;display:block;margin-bottom:3px}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-ok{background:#3a3020;color:#f5f0e8;border:none;border-radius:20px;padding:7px 18px;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer}
.btn-cx{background:transparent;border:1px solid #d0c8b8;color:#8a7a60;border-radius:20px;padding:7px 18px;font-size:11px;cursor:pointer}
.au-ov{position:fixed;inset:0;background:#0006;display:flex;align-items:center;justify-content:center;z-index:100}
.au-box{background:#faf7f2;border:1px solid #d0c8b8;border-radius:14px;padding:22px;width:580px;max-width:96vw;max-height:85vh;overflow-y:auto}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div><div class="brand">Pre-Listing Tracker</div><div class="brand-sub">LANDON REALTY GROUP</div></div>
    <button class="btn-top" data-oc="goToDash()">⌂ Dashboard</button>
    <div id="topbar-right">
      <span id="save-status">● saved</span><span id="file-count">0 files</span>
      <button class="btn-top" onclick="exportData()">↓ Export</button>
      <label class="btn-top" style="cursor:pointer"><span>↑ Import</span><input type="file" accept=".json" style="display:none" onchange="importData(this)"/></label>
      <button class="btn-primary" onclick="openModal()">+ New Listing</button>
    </div>
  </div>
  <div id="body"><div id="sidebar"></div><div id="main-scroll"><div id="main"></div></div></div>
</div>

<div id="modal" class="overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box"><h3>New Listing File</h3>
    <p style="font-size:10px;color:#a09880;margin-bottom:14px">FILL IN WHAT YOU KNOW — EDIT ANYTIME</p>
    <div class="fw"><label>PROPERTY ADDRESS</label><input class="fi" id="m-addr" placeholder="123 Main St, Burbank CA…"/></div>
    <div class="fw"><label>SELLER NAME(S)</label><input class="fi" id="m-sell" placeholder="Seller name(s)…"/></div>
    <div class="fw"><label>OUR AGENT</label>
      <select class="fi" id="m-agnt">
        <option value="">Select agent…</option>
        <optgroup label="Team Agents"><option>Nancy Gonzalez</option><option>Ethan Plemmons</option><option>Heather Savoy</option><option>Jason Chinchilla</option><option>Ki Contreras</option><option>Maya Worthy</option><option>Luke Simon</option><option>Jennifer Landon</option></optgroup>
        <optgroup label="Independent"><option>Casi Kneebone</option></optgroup>
        <optgroup label="Referral"><option>Artur Aleksanyan</option><option>Annie Mochrie</option></optgroup>
      </select>
    </div>
    <div class="fw"><label>LIST PRICE</label><input class="fi" id="m-price" placeholder="$000,000"/></div>
    <div class="fw"><label>TARGET LIST DATE</label><input class="fi" type="date" id="m-ldate"/></div>
    <div class="mbtns"><button class="btn-ok" onclick="createListing()">Create File</button><button class="btn-cx" onclick="closeModal()">Cancel</button></div>
  </div>
</div>

<div id="au-modal" style="display:none" class="au-ov" onclick="if(event.target===this)closeAU()">
  <div class="au-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <span style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:#3a3020">✉ Agent Update Email</span>
      <button onclick="closeAU()" style="background:none;border:none;color:#a09880;cursor:pointer;font-size:20px;line-height:1">×</button>
    </div>
    <textarea id="au-body" style="width:100%;min-height:320px;background:#f8f4ee;border:1px solid #e0d8c8;border-radius:8px;padding:12px;font-size:12px;color:#3a3020;resize:vertical;line-height:1.6"></textarea>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      <button onclick="openAUMail()" style="background:#3a3020;color:#f5f0e8;border:none;border-radius:20px;padding:7px 18px;font-size:11px;font-weight:700;cursor:pointer">✉ Open in Mail</button>
      <button onclick="copyAU()" style="background:transparent;border:1px solid #d0c8b8;color:#8a7a60;border-radius:20px;padding:7px 18px;font-size:11px;cursor:pointer">📋 Copy</button>
    </div>
  </div>
</div>

<script>
const SK="prelisting_v1";
let FILES=[],AID=null,VIEW="dash",DASH_NOTES="",STIMER=null,FTAB="info";

const LRG={
  brokName:"Landon Realty Group",brokAddr:"4004 W Riverside Dr, Burbank CA 91505",
  brokDRE:"02057743",brokPhone:"(310) 582-5379",brokerName:"Jennifer Landon",
  brokerDRE:"01281552",brokerEmail:"Jennifer@lrgla.com",tcName:"Mia Hanada",tcEmail:"Mia@lrgla.com",
  agents:{
    "Nancy Gonzalez":  {dre:"02122571",email:"Nancy@lrgla.com",phone:"(818) 601-4190"},
    "Ethan Plemmons":  {dre:"02109156",email:"Ethan@lrgla.com",phone:"(870) 917-7473"},
    "Heather Savoy":   {dre:"02220601",email:"Heather@lrgla.com",phone:"(747) 273-4529"},
    "Jason Chinchilla":{dre:"02204413",email:"Jason@lrgla.com",phone:"(818) 277-0224"},
    "Ki Contreras":    {dre:"02245823",email:"Ki@lrgla.com",phone:"(305) 546-2440"},
    "Maya Worthy":     {dre:"02242272",email:"Maya@lrgla.com",phone:"(818) 288-4393"},
    "Luke Simon":      {dre:"02362589",email:"Luke@lrgla.com",phone:"(818) 726-7116"},
    "Jennifer Landon": {dre:"01281552",email:"Jennifer@lrgla.com",phone:"(818) 613-1767"},
    "Casi Kneebone":   {dre:"01955896",email:"Kneebonerealty@gmail.com",phone:"(310) 871-7297"},
    "Artur Aleksanyan":{dre:"02126509",email:"Artur@lrgla.com",phone:"(818) 667-1701"},
    "Annie Mochrie":   {dre:"02193921",email:"Annie@lrgla.com",phone:"(818) 644-9789"},
  }
};

const DISC_ITEMS=[
  {group:"Office Disclosures",items:[
    {id:"pd_ad",label:"AD"},{id:"pd_aff",label:"Affiliation Business Disclosure: Lender / Realty Group"},
    {id:"pd_avid_la",label:"AVID — Listing Agent"},{id:"pd_bca",label:"BCA"},{id:"pd_bhia",label:"BHIA"},
    {id:"pd_burbank",label:"Burbank Agent Disclosure (Burbank / North Hollywood & Sun Valley)"},
    {id:"pd_ccpa",label:"CCPA"},{id:"pd_prbs",label:"PRBS"},{id:"pd_sbsa",label:"SBSA"},
    {id:"pd_sfls",label:"SFLS"},{id:"pd_srar",label:"SRAR or Local Advisory"},{id:"pd_wcmd",label:"WCMD"},
    {id:"pd_wfa",label:"WFA"},{id:"pd_wfda",label:"WFDA"},{id:"pd_whsd",label:"WHSD"},{id:"pd_whs",label:"WHS"},
  ]},
  {group:"Seller Disclosures",items:[
    {id:"pd_tds",label:"TDS —"},{id:"pd_spq",label:"SPQ"},
    {id:"pd_nhd",label:"NHD — Natural Hazard Report Disclosures & Receipt"},
    {id:"pd_lpd",label:"LPD — Lead Base Paint"},{id:"pd_eq",label:"Earthquake Hazards Report (pre-1960)"},
    {id:"pd_fhda",label:"FHDA"},{id:"pd_fhds",label:"FHDS — Fire High Fire Zone"},
    {id:"pd_smoke",label:"Photos of Smoke Alarm / Carbon Monoxide Detector"},
    {id:"pd_retrofit",label:"Retrofit Reports"},{id:"pd_solar",label:"SOLAR"},
    {id:"pd_esd",label:"ESD — Exempt Seller's Disclosure (if applicable)"},
    {id:"pd_mca",label:"MCA — Market Conditions Advisory"},{id:"pd_vp",label:"VP"},
  ]},
  {group:"If Indicated / Optional",items:[
    {id:"pd_termite",label:"Termite Report"},{id:"pd_sewer",label:"Sewer Inspection Report"},
    {id:"pd_sm_tds",label:"Santa Monica City Real Estate TDS"},
    {id:"pd_sb_mtn",label:"San Bernardino Mountain addendum"},
    {id:"pd_bhaa",label:"BHAA"},{id:"pd_psd",label:"PSD"},{id:"pd_biw",label:"BIW"},
    {id:"pd_deda",label:"DEDA"},{id:"pd_ta",label:"TA"},
  ]},
];

const CHECKLIST=[
  {id:"g_prelisting",group:"Pre-Listing (TC)",items:[
    {id:"pc_rla",label:"RLA Signed"},
    {id:"pc_bm",label:"BM File Open"},
    {id:"pc_prelim",label:"Prelim / Title Report Ordered"},
    {id:"pc_nhd",label:"NHD Ordered"},
    {id:"pc_tc_fee",label:"TC Fee Agreement Signed"},
  ]},
  {id:"g_seller_docs",group:"Seller Documents",items:[
    {id:"pc_trust_cert",label:"Trust Certification (if Trust)"},
    {id:"pc_trust_deed",label:"Copy of Trust Document (if Trust)"},
    {id:"pc_llc_op",label:"LLC Operating Agreement (if LLC)"},
    {id:"pc_llc_art",label:"LLC Articles of Organization (if LLC)"},
    {id:"pc_corp_res",label:"Corporate Resolution (if Corporation)"},
    {id:"pc_id",label:"Seller ID Verified"},
    {id:"pc_power_atty",label:"Power of Attorney (if applicable)"},
    {id:"pc_probate",label:"Letters Testamentary / Probate Order (if applicable)"},
  ]},
  {id:"g_disclosures",group:"Disclosures Sent to Seller",items:[
    {id:"pc_tds_sent",label:"TDS Sent to Seller"},
    {id:"pc_spq_sent",label:"SPQ Sent to Seller"},
    {id:"pc_avid_sent",label:"AVID Sent to Agent"},
    {id:"pc_nhd_sent",label:"NHD Sent to Seller for Receipt"},
    {id:"pc_disc_pkg",label:"Full Disclosure Package Compiled"},
  ]},
  {id:"g_escrow_prep",group:"Escrow / Offer Prep",items:[
    {id:"pc_offer_rev",label:"Offer(s) Reviewed with Seller"},
    {id:"pc_offer_acc",label:"Offer Accepted / Countered"},
    {id:"pc_escrow_open",label:"Escrow Opened"},
    {id:"pc_tc_handoff",label:"TC Tracker Created / Handed Off"},
  ]},
];

const MOD_TYPES=[
  {v:"price_reduction",l:"Price Reduction",bg:"#f0e8f8",bd:"#b090c8",tx:"#4a2a68"},
  {v:"price_increase", l:"Price Increase", bg:"#e8f4e8",bd:"#90c098",tx:"#2a5a30"},
  {v:"coord_change",   l:"Coordinator Change",bg:"#e8f0f8",bd:"#90b0d0",tx:"#2a4a6a"},
  {v:"co_listing",     l:"Co-Listing Added",bg:"#fff8e8",bd:"#d4c080",tx:"#5a4a00"},
  {v:"other",          l:"Other",bg:"#f5f0e8",bd:"#d0c8b8",tx:"#4a4030"},
];

function esc(s){s=s===null||s===undefined?"":(typeof s==="object"?JSON.stringify(s):String(s));return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function fmtShort(d){if(!d)return"";try{return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}catch{return d}}
function fmtCurr(v){if(!v)return"";const n=parseFloat(String(v).replace(/[^0-9.]/g,""));return isNaN(n)?"$"+v:"$"+n.toLocaleString()}
function daysUntil(d){if(!d)return null;const t=new Date(d+"T00:00:00"),n=new Date();n.setHours(0,0,0,0);return Math.round((t-n)/86400000)}

function nFile(){return{
  id:"pl_"+Date.now(),address:"",seller:"",sellerEmail:"",sellerEntity:"individual",sellerLegalName:"",
  additionalSellers:[],
  agent:"",agentDRE:"",agentEmail:"",agentPhone:"",listCoordinator:"",
  coListAgent:"",coListAgentDRE:"",coListAgentEmail:"",coListBrokerage:"",coListBrokerageDRE:"",
  coListAssistant:"",coListAssistantEmail:"",
  listPrice:"",listDate:"",expirationDate:"",tcFee:"",
  listingAgentComm:{amount:"",type:"percent",notes:""},
  rlaSigned:false,bmFileOpen:false,driveFolder:"",notes:"",dashNote:"",yearBuilt:"",apn:"",
  customUrgent:[],modifications:[],
  checks:{},customChecklist:{},discChecks:{},discChecksLabels:{},discChecksCustom:[],discNotes:{},
  createdAt:new Date().toISOString()
};}

function save(){
  clearTimeout(STIMER);
  const el=document.getElementById("save-status");
  if(el){el.textContent="saving…";el.style.color="#a09060";}
  STIMER=setTimeout(()=>{
    try{localStorage.setItem(SK,JSON.stringify({files:FILES,activeId:AID,view:VIEW,dashNotes:DASH_NOTES}));if(el){el.textContent="● saved";el.style.color="#90a880";}}catch(e){if(el)el.textContent="● error";}
  },400);
}

function load(){
  try{
    const r=localStorage.getItem(SK);
    if(r){
      const d=JSON.parse(r);
      FILES=(d.files||[]).map(f=>({...nFile(),...f,
        listingAgentComm:{amount:"",type:"percent",notes:"",...(f.listingAgentComm||{})},
        customUrgent:f.customUrgent||[],modifications:f.modifications||[],
        checks:{...(f.checks||{})},customChecklist:{...(f.customChecklist||{})},discChecks:{...(f.discChecks||{})},
        additionalSellers:f.additionalSellers||[],
        discChecksLabels:{...(f.discChecksLabels||{})},discChecksCustom:f.discChecksCustom||[],
        discNotes:{...(f.discNotes||{})},
      }));
      AID=d.activeId||null;VIEW=d.view||"dash";DASH_NOTES=d.dashNotes||"";
    }
  }catch(e){}
  if(!FILES.length){const f=nFile();FILES.push(f);AID=f.id;}
  if(!AID||!FILES.find(f=>f.id===AID))AID=FILES[0]?.id||null;
}

function exportData(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify({files:FILES,activeId:AID,view:VIEW,dashNotes:DASH_NOTES,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"}));a.download="prelisting-backup-"+new Date().toISOString().slice(0,10)+".json";document.body.appendChild(a);a.click();document.body.removeChild(a);}
function importData(input){const file=input.files[0];if(!file)return;if(!confirm("Import backup? Current data will be replaced."))return;const reader=new FileReader();reader.onload=function(e){try{const d=JSON.parse(e.target.result);if(!d.files)throw 0;localStorage.setItem(SK,JSON.stringify({files:d.files,activeId:d.activeId||null,view:"dash",dashNotes:d.dashNotes||""}));load();render();alert("Import successful!");}catch{alert("Invalid backup file.");}input.value="";};reader.readAsText(file);}

function progFile(f){
  const builtIn=CHECKLIST.flatMap(g=>g.items);
  const custom=CHECKLIST.flatMap(g=>(f.customChecklist||{})[g.id]||[]);
  const all=[...builtIn,...custom];
  const na=all.filter(i=>(f.checks[i.id]||{}).na).length;
  const done=all.filter(i=>(f.checks[i.id]||{}).done).length;
  const total=all.length-na;
  return total?Math.round(done/total*100):0;
}

function render(){
  document.getElementById("file-count").textContent=FILES.length+" file"+(FILES.length!==1?"s":"");
  rSidebar();
  if(VIEW==="dash")rDashboard();else rMain();
}

function rSidebar(){
  document.getElementById("sidebar").innerHTML=FILES.map(f=>{
    const p=progFile(f),ac=f.id===AID;
    return'<div class="pl-tab'+(ac?" active":"")+'" data-action="open" data-id="'+f.id+'">'+
      '<div style="margin-bottom:2px;display:flex;gap:4px;align-items:center;flex-wrap:wrap">'+
      (f.agent?'<span style="font-size:8px;background:#3a3020;color:#f5f0e8;border-radius:3px;padding:1px 6px;font-weight:700">'+esc((f.agent||"").split(" ")[0])+'</span>':"")+ 
      (f.listDate?'<span style="font-size:8px;color:#8a7a50;font-weight:700">List: '+fmtShort(f.listDate)+'</span>':"")+ 
      '</div>'+
      '<div class="t-addr">'+esc(f.address||"New Listing")+'</div>'+
      '<div class="t-sel">'+esc(f.seller||"—")+'</div>'+
      '<div class="pb-out"><div class="pb-in" style="width:'+p+'%"></div></div>'+
      '<div class="t-pct">'+p+'% complete</div>'+
      '</div>';
  }).join("");
}

function rDashboard(){
  const main=document.getElementById("main");
  const cards=FILES.map(f=>{
    const p=progFile(f);
    return`<div class="dash-card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;cursor:pointer" data-action="open" data-id="${f.id}">
        <div style="flex:1;min-width:0">
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px">
            ${f.agent?`<span style="font-size:9px;color:#a09880;font-weight:700">${esc(f.agent)}</span>`:""}
            ${f.rlaSigned?`<span style="font-size:8px;background:#e8f4e8;color:#2a6a3a;border-radius:20px;padding:1px 7px;font-weight:700">✓ RLA</span>`:`<span style="font-size:8px;background:#f5e8e8;color:#8a3a3a;border-radius:20px;padding:1px 7px;font-weight:700">RLA Pending</span>`}

function rMain(){
  const f=FILES.find(x=>x.id===AID);if(!f){rDashboard();return;}
  const main=document.getElementById("main");
  const tabs=[{id:"info",l:"File Info"},{id:"checklist",l:"Pre-Listing Checklist"},{id:"disclosures",l:"Disclosures"},{id:"mods",l:"Modifications"},{id:"ourside",l:"Our Side"}];
  const tabBar=tabs.map(t=>`<button class="tab-btn${FTAB===t.id?" active":""}" data-oc="swTab('${t.id}')">${t.l}</button>`).join("");
  let content="";
  if(FTAB==="info")content=rInfo(f);
  else if(FTAB==="checklist")content=rChecklist(f);
  else if(FTAB==="disclosures")content=rDiscs(f);
  else if(FTAB==="mods")content=rMods(f);
  else if(FTAB==="ourside")content=rOurSide(f);

  // Build compact urgent items for the persistent banner
  const urgentItems=[];
  if(!f.rlaSigned)urgentItems.push({l:"RLA Not Signed",sev:"red"});
  if(f.expirationDate){
    const ed=daysUntil(f.expirationDate);
    if(ed!==null&&ed<0)urgentItems.push({l:"Listing EXPIRED "+Math.abs(ed)+"d ago",sev:"red"});
    else if(ed!==null&&ed<=14)urgentItems.push({l:"Listing Expires in "+ed+"d ("+fmtShort(f.expirationDate)+")",sev:"amber"});
  }
  if(f.listDate){const dd=daysUntil(f.listDate);if(dd!==null&&dd<=7&&dd>=0)urgentItems.push({l:"Goes Live in "+dd+"d",sev:"amber"});}
  (f.customUrgent||[]).forEach(u=>urgentItems.push({l:u.text,sev:"purple"}));

  const urgentBanner=urgentItems.length?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;padding:9px 12px;background:#fffdf5;border:1px solid #d4c080;border-radius:10px;align-items:center">
    <span style="font-size:9px;font-weight:700;color:#7a5a00;letter-spacing:1px;white-space:nowrap">URGENT</span>
    ${urgentItems.map(u=>{
      const colors={red:{bg:"#f5e8e8",col:"#8a3a3a",bd:"#d09090"},amber:{bg:"#fff3cd",col:"#7a5a00",bd:"#d4c080"},purple:{bg:"#f0e8f8",col:"#4a2a68",bd:"#b090c8"}};
      const c=colors[u.sev]||colors.amber;
      return`<span style="font-size:9px;font-weight:700;background:${c.bg};color:${c.col};border:1px solid ${c.bd};border-radius:20px;padding:2px 10px;white-space:nowrap">⚠ ${esc(u.l)}</span>`;
    }).join("")}
  </div>`:"";

  main.innerHTML=`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:#2a2010">${esc(f.address||"New Listing")}</div>
        <div style="font-size:11px;color:#8a7a60;margin-top:1px">${esc(f.seller||"—")}${f.listPrice?` · <b style="color:#3a3020">${fmtCurr(f.listPrice)}</b>`:""}${f.expirationDate?` · <span style="font-size:10px;color:${daysUntil(f.expirationDate)<0?"#8a3a3a":daysUntil(f.expirationDate)<=14?"#7a5a00":"#a09880"}">Exp: ${fmtShort(f.expirationDate)}</span>`:""}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <button data-oc="sendAU('${f.id}')" style="background:#f5f0e8;border:1px solid #d0c8b8;color:#3a3020;border-radius:20px;padding:5px 14px;font-size:10px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer">✉ Agent Update</button>
        <button data-oc="rmFile('${f.id}')" style="background:transparent;border:1px solid #d0b8b8;color:#a07070;border-radius:20px;padding:5px 12px;font-size:10px;cursor:pointer">✕ Remove</button>
      </div>
    </div>
    ${urgentBanner}
    <div class="tab-bar">${tabBar}</div>
    ${content}
  </div>`;
}

      <div style="flex:0 0 130px"><label class="flabel">PHONE</label><input class="fi" value="${esc(f.agentPhone||ag.phone||"")}" placeholder="Phone…" onchange="sF('${f.id}','agentPhone',this.value)" onblur="sF('${f.id}','agentPhone',this.value)"/></div>
      <div style="flex:1 1 140px"><label class="flabel">LISTING COORDINATOR</label><input class="fi" value="${esc(f.listCoordinator||"")}" placeholder="Coordinator name…" onchange="sF('${f.id}','listCoordinator',this.value)" onblur="sF('${f.id}','listCoordinator',this.value)"/></div>
    </div>
  </div></div>

  <div class="sec"><div class="sec-hdr"><span class="sec-ttl">Co-Listing Agent</span><span style="font-size:10px;color:#b0a890">optional</span></div><div class="sec-body">
    <div class="frow" style="margin-bottom:6px">
      <div style="flex:1 1 160px"><label class="flabel">NAME</label><input class="fi" value="${esc(f.coListAgent||"")}" placeholder="Co-listing agent…" onchange="sF('${f.id}','coListAgent',this.value)" onblur="sF('${f.id}','coListAgent',this.value)"/></div>
      <div style="flex:0 0 110px"><label class="flabel">DRE #</label><input class="fi" value="${esc(f.coListAgentDRE||"")}" placeholder="DRE…" onchange="sF('${f.id}','coListAgentDRE',this.value)" onblur="sF('${f.id}','coListAgentDRE',this.value)"/></div>
      <div style="flex:1 1 155px"><label class="flabel">EMAIL</label><input class="fi" value="${esc(f.coListAgentEmail||"")}" placeholder="Email…" onchange="sF('${f.id}','coListAgentEmail',this.value)" onblur="sF('${f.id}','coListAgentEmail',this.value)"/></div>
      <div style="flex:1 1 140px"><label class="flabel">BROKERAGE</label><input class="fi" value="${esc(f.coListBrokerage||"")}" placeholder="Brokerage…" onchange="sF('${f.id}','coListBrokerage',this.value)" onblur="sF('${f.id}','coListBrokerage',this.value)"/></div>
      <div style="flex:0 0 110px"><label class="flabel">BROKERAGE DRE #</label><input class="fi" value="${esc(f.coListBrokerageDRE||"")}" placeholder="DRE…" onchange="sF('${f.id}','coListBrokerageDRE',this.value)" onblur="sF('${f.id}','coListBrokerageDRE',this.value)"/></div>
    </div>
    <div class="frow">
      <div style="flex:1 1 160px"><label class="flabel">ASSISTANT</label><input class="fi" value="${esc(f.coListAssistant||"")}" placeholder="Assistant name…" onchange="sF('${f.id}','coListAssistant',this.value)" onblur="sF('${f.id}','coListAssistant',this.value)"/></div>
      <div style="flex:1 1 180px"><label class="flabel">ASSISTANT EMAIL</label><input class="fi" value="${esc(f.coListAssistantEmail||"")}" placeholder="Email…" onchange="sF('${f.id}','coListAssistantEmail',this.value)" onblur="sF('${f.id}','coListAssistantEmail',this.value)"/></div>
    </div>
  </div></div>

  ${rUrgent(f)}

  <div class="sec"><div class="sec-hdr"><span class="sec-ttl">Notes</span></div><div class="sec-body">
    <textarea class="fi" rows="4" placeholder="Notes about this listing…" onchange="sF('${f.id}','notes',this.value)" onblur="sF('${f.id}','notes',this.value)" style="resize:vertical">${esc(f.notes||"")}</textarea>
  </div></div>
  </div>`;
}

function rUrgent(f){
  const u=[];
  if(!f.rlaSigned)u.push({l:"RLA Not Signed",d:"Required before listing",bg:"#f5e8e8",bd:"#d09090",dot:"#c07070",tx:"#8a3a3a"});
  if(!f.listDate)u.push({l:"No List Date Set",d:"Set a target listing date",bg:"#fff8e8",bd:"#d4c080",dot:"#c4a840",tx:"#7a5a00"});
  if(f.listDate){const dd=daysUntil(f.listDate);if(dd!==null&&dd<=7&&dd>=0)u.push({l:"Listing In "+dd+"d",d:"Going live soon — verify disclosures",bg:"#fff8e8",bd:"#d4c080",dot:"#c4a840",tx:"#7a5a00"});}
  if(f.expirationDate){
    const ed=daysUntil(f.expirationDate);
    if(ed!==null&&ed<0)u.push({l:"Listing EXPIRED",d:"Expired "+Math.abs(ed)+"d ago — RLA renewal needed",bg:"#f5e8e8",bd:"#d09090",dot:"#c07070",tx:"#8a3a3a"});
    else if(ed!==null&&ed<=14)u.push({l:"Listing Expires in "+ed+"d",d:"Expiration: "+fmtShort(f.expirationDate)+" — discuss renewal with agent",bg:"#fff8e8",bd:"#d4c080",dot:"#c4a840",tx:"#7a5a00"});
  }
  (f.customUrgent||[]).forEach(x=>u.push({l:x.text,d:"Custom",bg:"#f0e8f8",bd:"#b090c8",dot:"#8a60a8",tx:"#4a2a68",id:x.id,custom:true}));
  return`<div style="background:#faf7f2;border:1px solid #e0d8c8;border-radius:12px;padding:14px 16px;margin-bottom:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span style="font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;font-style:italic;color:#4a4030">Urgent Tasks</span>
      <span style="font-size:9px;color:#b0a890;font-weight:700">${u.length} item${u.length!==1?"s":""}</span>
    </div>
    ${!u.length?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><span>✓</span><span style="font-size:12px;color:#3a6644;font-weight:700">No urgent tasks — listing is on track!</span></div>`:""}
    ${u.length?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:10px">${u.map(x=>`<div style="background:${x.bg};border:1px solid ${x.bd};border-radius:8px;padding:9px 12px;display:flex;align-items:flex-start;gap:8px"><div style="width:7px;height:7px;border-radius:50%;background:${x.dot};flex-shrink:0;margin-top:3px"></div><div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:700;color:${x.tx}">${esc(x.l)}</div><div style="font-size:9px;color:${x.tx};opacity:.8;margin-top:1px">${esc(x.d)}</div></div>${x.custom?`<button data-oc="rmUrgent('${f.id}','${x.id}')" style="background:none;border:none;color:#b090c8;cursor:pointer;font-size:14px;line-height:1;padding:0;flex-shrink:0">×</button>`:""}</div>`).join("")}</div>`:""}
    <div style="display:flex;gap:8px;align-items:center;padding-top:8px;border-top:1px solid #ece4d8;flex-wrap:wrap">
      <input id="pu-${f.id}" class="fi-sm" placeholder="Describe urgent matter…" style="flex:1;min-width:150px" onkeydown="if(event.key==='Enter')addUrgent('${f.id}')"/>
      <button data-oc="addUrgent('${f.id}')" style="background:#3a3020;color:#f5f0e8;border:none;border-radius:20px;padding:5px 14px;font-size:10px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer">+ Add</button>
    </div>
  </div>`;
}

function rChecklist(f){
  const cc=f.customChecklist||{};
  const builtIn=CHECKLIST.flatMap(g=>g.items);
  const customAll=CHECKLIST.flatMap(g=>(cc[g.id]||[]));
  const all=[...builtIn,...customAll];
  const na=all.filter(i=>(f.checks[i.id]||{}).na).length;
  const done=all.filter(i=>(f.checks[i.id]||{}).done).length;
  const total=all.length-na;
  const pct=total?Math.round(done/total*100):0;

  function clRow(i, isCustom, gid){
    const c=f.checks[i.id]||{};
    const customLabel=((f.checks[i.id]||{}).label)||null; // edited label stored in checks
    const lbl=(f.checks[i.id]||{}).label||i.label;
    return`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 16px;border-bottom:1px solid #f0ebe0;background:${c.na?"#faf8f5":c.done?"#f5faf5":"#faf7f2"}">
      <input type="checkbox" style="width:14px;height:14px;accent-color:#8a7a50;cursor:pointer;flex-shrink:0;margin-top:2px" ${c.done?"checked":""} ${c.na?"disabled":""} onchange="setCh('${f.id}','${i.id}',this.checked)"/>
      <div style="flex:1;min-width:0">
        <input type="text" style="font-size:11px;color:${c.na?"#b0a890":c.done?"#8a9a80":"#3a3020"};text-decoration:${c.na||c.done?"line-through":"none"};background:transparent;border:none;border-bottom:1px dashed ${c.label?"#c8b870":"transparent"};width:100%;font-family:'Lato',sans-serif;padding:1px 0;line-height:1.4" value="${esc(lbl)}" title="Click to edit" onchange="setChLabel('${f.id}','${i.id}',this.value)" onblur="setChLabel('${f.id}','${i.id}',this.value)"/>
        ${c.label?`<div style="font-size:8px;color:#b08840;margin-top:1px">✎ edited · <button data-oc="setChLabel('${f.id}','${i.id}',null)" style="background:#fff3e0;border:1px solid #d4a840;border-radius:8px;color:#8a5a00;cursor:pointer;font-size:8px;padding:1px 6px;font-family:'Lato',sans-serif;font-weight:700">↩ restore</button></div>`:""}
        ${c.done&&c.date?`<div style="font-size:9px;color:#3a6644;font-weight:700;margin-top:1px">✓ ${fmtShort(c.date)}</div>`:""}
      </div>
      <button style="font-size:9px;color:${c.na?"#b08040":"#c0b8a8"};font-weight:700;cursor:pointer;padding:2px 7px;border:1px solid ${c.na?"#d4c080":"#e0d8c8"};border-radius:10px;background:${c.na?"#fff8e8":"transparent"};flex-shrink:0;white-space:nowrap" data-oc="setChNA('${f.id}','${i.id}',${!c.na})">${c.na?"N/A ✓":"N/A"}</button>
      ${isCustom?`<button data-oc="rmChCustom('${f.id}','${gid}','${i.id}')" style="background:none;border:none;color:#c0a898;cursor:pointer;font-size:16px;line-height:1;padding:0 2px;flex-shrink:0">×</button>`:""}
    </div>`;
  }

  const secs=CHECKLIST.map(g=>{
    const custom=(cc[g.id]||[]);
    const allItems=[...g.items,...custom];
    const gd=allItems.filter(i=>(f.checks[i.id]||{}).done).length;
    const gna=allItems.filter(i=>(f.checks[i.id]||{}).na).length;
    const rows=g.items.map(i=>clRow(i,false,g.id)).join("");
    const customRows=custom.map(i=>clRow(i,true,g.id)).join("");
    return`<div class="sec" style="margin-bottom:12px">
      <div class="sec-hdr"><span class="sec-ttl">${g.group}</span><span style="font-size:10px;color:#8a7a50;font-weight:700">${gd}/${allItems.length-gna}</span></div>
      ${rows}
      ${customRows}
      <div style="display:flex;gap:7px;align-items:center;padding:8px 14px;background:#f8f4ee;flex-wrap:wrap">
        <input id="cl-add-${f.id}-${g.id}" class="fi-sm" placeholder="Add item to ${g.group}…" style="flex:1;min-width:140px;font-size:10px" onkeydown="if(event.key==='Enter')addChCustom('${f.id}','${g.id}')"/>
        <button data-oc="addChCustom('${f.id}','${g.id}')" style="background:#3a3020;color:#f5f0e8;border:none;border-radius:20px;padding:4px 12px;font-size:9px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap">+ Add</button>
      </div>
    </div>`;
  }).join("");

  return`<div>
    <div style="background:#faf7f2;border:1px solid #e0d8c8;border-radius:10px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <div style="flex:1;min-width:80px;background:#e8e0d0;border-radius:6px;height:6px"><div style="height:6px;border-radius:6px;background:linear-gradient(90deg,#8a7a50,#b0a060);width:${pct}%"></div></div>
      <span style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:#2a2010">${pct}%</span>
      <span style="font-size:10px;color:#8a7a60">${done} done · ${total-done} remaining${na?" · "+na+" N/A":""}</span>
      <span style="font-size:9px;color:#b0a890">· click any label to rename</span>
    </div>
    ${secs}
  </div>`;
}

function rDiscs(f){
  const all=DISC_ITEMS.flatMap(g=>g.items);
  const na=all.filter(i=>(f.discChecks[i.id]||{}).na).length;
  const done=all.filter(i=>(f.discChecks[i.id]||{}).done).length;
  const total=all.length-na;
  const pct=total?Math.round(done/total*100):0;
  const secs=DISC_ITEMS.map(g=>{
    const gd=g.items.filter(i=>(f.discChecks[i.id]||{}).done).length;
    const gna=g.items.filter(i=>(f.discChecks[i.id]||{}).na).length;
    const rows=g.items.map(i=>{
      const c=f.discChecks[i.id]||{};
      const lbl=(f.discChecksLabels||{})[i.id]||i.label;
      return`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 16px;border-bottom:1px solid #f0ebe0;background:${c.na?"#faf8f5":c.done?"#f5faf5":"#faf7f2"}">
        <input type="checkbox" style="width:14px;height:14px;accent-color:#8a7a50;cursor:pointer;flex-shrink:0;margin-top:2px" ${c.done?"checked":""} ${c.na?"disabled":""} onchange="setDisc('${f.id}','${i.id}',this.checked)"/>
        <div style="flex:1;min-width:0">
          <input type="text" style="font-size:11px;color:${c.na?"#b0a890":c.done?"#8a9a80":"#3a3020"};text-decoration:${c.na||c.done?"line-through":"none"};background:transparent;border:none;border-bottom:1px dashed ${(f.discChecksLabels||{})[i.id]?"#c8b870":"transparent"};width:100%;font-family:'Lato',sans-serif;padding:1px 0" value="${esc(lbl)}" title="Click to edit label" onchange="setDiscLbl('${f.id}','${i.id}',this.value)" onblur="setDiscLbl('${f.id}','${i.id}',this.value)"/>
          ${(f.discChecksLabels||{})[i.id]?`<div style="font-size:8px;color:#b08840;margin-top:1px">✎ edited · <button data-oc="setDiscLbl('${f.id}','${i.id}','')" style="background:#fff3e0;border:1px solid #d4a840;border-radius:8px;color:#8a5a00;cursor:pointer;font-size:8px;padding:2px 7px;font-family:'Lato',sans-serif;font-weight:700">↩ restore</button></div>`:""}
          <div style="display:flex;gap:4px;margin-top:5px">
            <button data-oc="setDiscSign('${f.id}','${i.id}','seller')" style="cursor:pointer;padding:2px 8px;font-size:9px;font-family:'Lato',sans-serif;font-weight:700;border-radius:20px;border:1px solid ${c.seller?"#3a6644":"#c0c8b8"};background:${c.seller?"#2a5a34":"transparent"};color:${c.seller?"#fff":"#7a9070"};white-space:nowrap">${c.seller?"✓ Seller":"Seller"}</button>
            <button data-oc="setDiscSign('${f.id}','${i.id}','buyer')" style="cursor:pointer;padding:2px 8px;font-size:9px;font-family:'Lato',sans-serif;font-weight:700;border-radius:20px;border:1px solid ${c.buyer?"#1a3a5c":"#b8c0cc"};background:${c.buyer?"#1a3a5c":"transparent"};color:${c.buyer?"#fff":"#6070a0"};white-space:nowrap">${c.buyer?"✓ Buyer":"Buyer"}</button>
          </div>
          <input type="text" style="background:transparent;border:none;border-bottom:1px solid #ece4d8;width:100%;font-family:'Lato',sans-serif;font-size:10px;color:#7a6a50;padding:2px 0;margin-top:3px" value="${esc((f.discNotes||{})[i.id]||"")}" placeholder="Notes…" onchange="setDiscNote('${f.id}','${i.id}',this.value)" onblur="setDiscNote('${f.id}','${i.id}',this.value)"/>
        </div>
        <button style="font-size:9px;color:${c.na?"#b08040":"#c0b8a8"};font-weight:700;cursor:pointer;padding:2px 7px;border:1px solid ${c.na?"#d4c080":"#e0d8c8"};border-radius:10px;background:${c.na?"#fff8e8":"transparent"};flex-shrink:0;white-space:nowrap" data-oc="setDiscNA('${f.id}','${i.id}',${!c.na})">${c.na?"N/A ✓":"N/A"}</button>
      </div>`;
    }).join("");
    return`<div class="sec" style="margin-bottom:12px"><div class="sec-hdr" style="background:#f8f5f0"><span class="sec-ttl">${g.group}</span><span style="font-size:10px;color:#8a7a50;font-weight:700">${gd}/${g.items.length-gna}</span></div>${rows}</div>`;
  }).join("");
  const customRows=(f.discChecksCustom||[]).map(i=>{const c=f.discChecks[i.id]||{};return`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 16px;border-bottom:1px solid #f0ebe0;background:#fdf9f5">
    <input type="checkbox" style="width:14px;height:14px;accent-color:#8a7a50;cursor:pointer;flex-shrink:0;margin-top:2px" ${c.done?"checked":""} onchange="setDisc('${f.id}','${i.id}',this.checked)"/>
    <div style="flex:1;display:flex;align-items:center;gap:8px">
      <input type="text" style="flex:1;font-size:11px;background:transparent;border:none;border-bottom:1px dashed #c8b870;font-family:'Lato',sans-serif;padding:1px 0;color:${c.done?"#8a9a80":"#3a3020"};text-decoration:${c.done?"line-through":"none"}" value="${esc(i.label)}" onchange="setDiscCustLbl('${f.id}','${i.id}',this.value)" onblur="setDiscCustLbl('${f.id}','${i.id}',this.value)"/>
      <span style="font-size:8px;background:#ede8de;color:#8a7a60;border-radius:3px;padding:1px 4px;font-weight:700;flex-shrink:0">custom</span>
    </div>
    <button data-oc="rmDiscCust('${f.id}','${i.id}')" style="background:none;border:none;color:#c0a898;cursor:pointer;font-size:16px;line-height:1;padding:0 2px;flex-shrink:0">×</button>
  </div>`;}).join("");
  return`<div><div style="background:#faf7f2;border:1px solid #e0d8c8;border-radius:10px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
    <div style="flex:1;min-width:80px;background:#e8e0d0;border-radius:6px;height:6px"><div style="height:6px;border-radius:6px;background:linear-gradient(90deg,#8a7a50,#b0a060);width:${pct}%"></div></div>
    <span style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:#2a2010">${pct}%</span>
    <span style="font-size:10px;color:#8a7a60">${done} done · ${total-done} remaining${na?" · "+na+" N/A":""}</span>
    <span style="font-size:9px;color:#b0a890">click label to edit</span>
  </div>${secs}
  <div class="sec" style="margin-bottom:12px"><div class="sec-hdr" style="background:#f8f5f0"><span class="sec-ttl">Custom Items</span></div>
    ${customRows}
    <div style="display:flex;gap:8px;align-items:center;padding:10px 16px;background:#f8f4ee;flex-wrap:wrap">
      <input id="disc-add-${f.id}" class="fi-sm" placeholder="New disclosure item…" style="flex:1;min-width:140px" onkeydown="if(event.key==='Enter')addDiscCust('${f.id}')"/>
      <button data-oc="addDiscCust('${f.id}')" style="background:#3a3020;color:#f5f0e8;border:none;border-radius:20px;padding:5px 14px;font-size:10px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer">+ Add</button>
    </div>
  </div></div>`;
}

function rMods(f){
  const mods=f.modifications||[];
  const rows=mods.map((m,i)=>{
    const mt=MOD_TYPES.find(t=>t.v===m.type)||MOD_TYPES[4];
    const isPriceChange=m.type==="price_reduction"||m.type==="price_increase";
    return`<div style="background:#faf7f2;border:1px solid #e0d8c8;border-radius:8px;padding:12px;margin-bottom:8px;position:relative">
      <button data-oc="rmMod('${f.id}',${i})" style="position:absolute;top:10px;right:10px;background:none;border:none;color:#c0a898;cursor:pointer;font-size:16px;line-height:1">×</button>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">
        ${MOD_TYPES.map(t=>{const active=m.type===t.v;return`<button data-oc="setMod('${f.id}',${i},'type','${t.v}')" style="cursor:pointer;padding:2px 8px;font-size:9px;font-family:'Lato',sans-serif;font-weight:700;border-radius:20px;border:1px solid ${active?t.bd:"#d0c8b8"};background:${active?t.bg:"transparent"};color:${active?t.tx:"#8a7a60"}">${t.l}</button>`;}).join("")}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start">
        <div style="flex:1;min-width:160px"><label class="flabel">DESCRIPTION</label>
          <input class="fi" value="${esc(m.description||"")}" placeholder="${isPriceChange?"e.g. Reduced from $650k to $625k…":"Describe the change…"}" onchange="setMod('${f.id}',${i},'description',this.value)" onblur="setMod('${f.id}',${i},'description',this.value)"/>
        </div>
        <div style="flex:0 0 135px"><label class="flabel">DATE</label>
          <input type="date" class="fi-sm" style="width:100%" value="${esc(m.date||"")}" onchange="setMod('${f.id}',${i},'date',this.value)"/>
        </div>
        ${isPriceChange?`<div style="flex:0 0 110px"><label class="flabel">NEW PRICE</label><input class="fi-sm" style="width:100%" value="${esc(m.newPrice||"")}" placeholder="$000,000" onchange="setMod('${f.id}',${i},'newPrice',this.value)" onblur="setMod('${f.id}',${i},'newPrice',this.value)"/></div>`:""}
      </div>
      ${m.description?`<div style="margin-top:8px;font-size:9px;color:${mt.tx};background:${mt.bg};border:1px solid ${mt.bd};border-radius:6px;padding:5px 10px;font-weight:700">${mt.l}${m.date?" · "+fmtShort(m.date):""}${m.newPrice?" → "+fmtCurr(m.newPrice):""}: ${esc(m.description)}</div>`:""}

function setMod(fid,idx,k,val){

  if(k==="newPrice"&&val&&(f.modifications[idx].type==="price_reduction"||f.modifications[idx].type==="price_increase")){
    f.listPrice=val;
  }
  if(k==="type")rMain();else{rSidebar();save();}

function sendAU(fid){
  const f=FILES.find(x=>x.id===fid);if(!f)return;
  const allItems=[...CHECKLIST.flatMap(g=>g.items),...CHECKLIST.flatMap(g=>(f.customChecklist||{})[g.id]||[])];
  const done=allItems.filter(i=>(f.checks[i.id]||{}).done).map(i=>i.label);
  const remaining=allItems.filter(i=>!(f.checks[i.id]||{}).done&&!(f.checks[i.id]||{}).na).map(i=>i.label);
  const mods=f.modifications||[];
  const div="\u2500".repeat(23);
  let body="Hi "+(f.agent||"[Agent Name]")+",\n\n";
  body+="Here is your listing update for "+(f.address||"[Property Address]")+".\n\n";
  body+="LISTING DETAILS\n"+div+"\n";
  body+="Property:     "+(f.address||"[Address]")+"\n";
  body+="Seller:       "+(f.seller||"[Seller]")+"\n";
  body+="List Price:   "+(f.listPrice?fmtCurr(f.listPrice):"[TBD]")+"\n";
  body+="Target Date:  "+(f.listDate?new Date(f.listDate+"T00:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}):"[TBD]")+"\n";
  body+="RLA Signed:   "+(f.rlaSigned?"\u2713 Yes":"\u2717 Pending")+"\n";
  body+="BM File Open: "+(f.bmFileOpen?"\u2713 Yes":"\u2717 Pending")+"\n\n";
  body+="COMPLETED ("+done.length+")\n"+div+"\n";
  body+=done.length?done.map(l=>"  \u2713 "+l).join("\n"):"  \u2014 None yet";
  body+="\n\nSTILL NEEDED ("+remaining.length+")\n"+div+"\n";
  body+=remaining.length?remaining.map(l=>"  \u00b7 "+l).join("\n"):"  \u2014 All complete!";
  if(mods.length){
    body+="\n\nMODIFICATIONS ("+mods.length+")\n"+div+"\n";
    body+=mods.map(m=>{const mt={price_reduction:"Price Reduction",price_increase:"Price Increase",coord_change:"Coordinator Change",co_listing:"Co-Listing Added",other:"Other"}[m.type]||"Change";return"  "+mt+(m.date?" \u00b7 "+fmtShort(m.date):"")+(m.newPrice?" \u2192 "+fmtCurr(m.newPrice):"")+(m.description?": "+m.description:"");}).join("\n");
  }
  if(f.notes){body+="\n\nNOTES\n"+div+"\n"+f.notes;}
  body+="\n\nBest,\n"+LRG.tcName+"\n"+LRG.tcEmail+"\nLandon Realty Group";
  document.getElementById("au-body").value=body;
  document.getElementById("au-modal").style.display="flex";
}

document.addEventListener('click',function(e){
  let el=e.target;

    if(el.dataset&&el.dataset.action==='open'&&el.dataset.id){openFile(el.dataset.id);return;}
    if(el.hasAttribute&&el.hasAttribute('data-oc')){
      const expr=el.getAttribute('data-oc');

      return;
    }
    if('INPUT TEXTAREA SELECT'.includes(el.tagName))return;
    el=el.parentElement;
  }
});
